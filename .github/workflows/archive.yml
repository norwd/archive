---

name: "Archive Link"
run-name: "Archiving ${{ inputs.url }}"

on:
  workflow_dispatch:
    inputs:
      url:
        required: true
        type: string
        description: |
          The url of the asset to archive.

jobs:
  archive-directory:
    if: ${{ endsWith(inputs.url, '/.') }}
    name: Archive Directory
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.AUTO_DOWNLOAD_ARCHIVE }}
          ref: ${{ github.ref }}

      - name: Download File
        run: echo wget ‐‐directory-prefix="$(echo "${URL}" | sed -E 's/^https?:\/\///')" "${URL}"; exit # incomplete
        env:
          URL: ${{ inputs.url }}

      - name: Setup GPG Keys
        uses: crazy-max/ghaction-import-gpg@v5
        with:
          gpg_private_key: ${{ secrets.AUTO_COMMIT_GPG_PRIVATE_KEY_ARCHIVE }}
          passphrase: ${{ secrets.AUTO_COMMIT_GPG_PASSPHRASE_ARCHIVE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Push Changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          file_pattern: .
          skip_dirty_check: true
          commit_author: norwd <106889957+norwd@users.noreply.github.com>
          commit_user_name: norwd
          commit_user_email: 106889957+norwd@users.noreply.github.com
          commit_options: -s -S
          commit_message: |
            Original source: ${{ inputs.url }}

            This is an automatic commit. See the archive workflow.

  archive-file:
    if: ${{ !endsWith(inputs.url, '/.') }}
    name: Archive File
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.AUTO_DOWNLOAD_ARCHIVE }}
          ref: ${{ github.ref }}

      - name: Download File
        run: echo wget ‐‐directory-prefix="$(dirname "$(echo "${URL}" | sed -E 's/^https?:\/\///')")" "${URL}"; exit # incomplete
        env:
          URL: ${{ inputs.url }}

      - name: Setup GPG Keys
        uses: crazy-max/ghaction-import-gpg@v5
        with:
          gpg_private_key: ${{ secrets.AUTO_COMMIT_GPG_PRIVATE_KEY_ARCHIVE }}
          passphrase: ${{ secrets.AUTO_COMMIT_GPG_PASSPHRASE_ARCHIVE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Push Changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          file_pattern: .
          skip_dirty_check: true
          commit_author: norwd <106889957+norwd@users.noreply.github.com>
          commit_user_name: norwd
          commit_user_email: 106889957+norwd@users.noreply.github.com
          commit_options: -s -S
          commit_message: |
            Original source: ${{ inputs.url }}

            This is an automatic commit. See the archive workflow.
