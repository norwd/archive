<p><b>deadly embrace</b> n. <p>
 Same as <b><a href="deadlock.html">deadlock</a></b>, though usually
   used only when exactly two processes are involved.  This is the
   more popular term in Europe, while <b><a href="deadlock.html">deadlock</a></b> predominates in
   the United States.
