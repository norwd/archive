<p><b>ques</b> /kwes/ <p>
 1. n. The question mark character (<code>?</code>,
   ASCII 0111111).  2. interj.  What?  Also frequently verb-doubled as
   "Ques ques?"  See <b><a href="wall.html">wall</a></b>.
