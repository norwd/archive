<p><b>flat-file</b> adj. <p>
 A <b><a href="flatten.html">flatten</a></b>ed representation of some
   database or tree or network structure as a single file from which
   the structure could implicitly be rebuilt, esp. one in
   <b><a href="flat-ASCII.html">flat-ASCII</a></b> form.  See also <b><a href="sharchive.html">sharchive</a></b>.
