<p><b>BAD</b> /B-A-D/ adj. <p>
 [IBM: acronym, `Broken As Designed']
   Said of a program that is <b><a href="bogus.html">bogus</a></b> because of bad design and
   misfeatures rather than because of bugginess.  See <b><a href="working-as-designed.html">working as designed</a></b>.
