<p><b>UBD</b> /U-B-D/ n. <p>
 [abbreviation for `User Brain
   Damage'] An abbreviation used to close out trouble reports
   obviously due to utter cluelessness on the user's part.  Compare
   <b><a href="pilot-error.html">pilot error</a></b>, <b><a href="PEBKAC.html">PEBKAC</a></b>; oppose <b><a href="PBD.html">PBD</a></b>; see
   also <b><a href="brain-damaged.html">brain-damaged</a></b>.
