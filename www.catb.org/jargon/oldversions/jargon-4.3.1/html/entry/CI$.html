<p><b>CI$</b> // n. <p>
 Hackerism for `CIS', CompuServe Information
   Service.  The dollar sign refers to CompuServe's rather steep line
   charges.  Often used in <b><a href="sig-block.html">sig block</a></b>s just before a CompuServe
   address.  Syn. <b><a href="Compu$erve.html">Compu$erve</a></b>.
