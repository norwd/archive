<p><b>huff</b> v. <p>
 To compress data using a Huffman code.  Various
   programs that use such methods have been called `HUFF' or some
   variant thereof.  Oppose <b><a href="puff.html">puff</a></b>.  Compare <b><a href="crunch.html">crunch</a></b>,
   <b><a href="compress.html">compress</a></b>.
