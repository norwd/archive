<p><b>choke</b> v. <p>
 [common] To reject input, often
   ungracefully.  "NULs make System V's <code>lpr(1)</code> choke."  "I
   tried building an <b><a href="EMACS.html">EMACS</a></b> binary to use <b><a href="X.html">X</a></b>, but
   <code>cpp(1)</code> choked on all those <code>#define</code>s."  See
   <b><a href="barf.html">barf</a></b>, <b><a href="gag.html">gag</a></b>, <b><a href="vi.html">vi</a></b>.
