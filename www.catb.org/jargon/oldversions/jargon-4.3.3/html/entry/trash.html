<p><b>trash</b> vt. <p>
 To destroy the contents of (said of a data
   structure).  The most common of the family of near-synonyms
   including <b><a href="mung.html">mung</a></b>, <b><a href="mangle.html">mangle</a></b>, <b><a href="scribble.html">scribble</a></b>, and <b><a href="roach.html">roach</a></b>.
