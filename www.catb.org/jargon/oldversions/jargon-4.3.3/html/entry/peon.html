<p><b>peon</b> n. <p>
 A person with no special (<b><a href="root.html">root</a></b> or <b><a href="wheel.html">wheel</a></b>)
   privileges on a computer system.  "I can't create an account on
   <em>foovax</em> for you; I'm only a peon there."
