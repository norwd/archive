<p><b>bytesexual</b> /bi:t`sek'shu-*l/ adj. <p>
 [rare] Said of
   hardware, denotes willingness to compute or pass data in either
   <b><a href="big-endian.html">big-endian</a></b> or <b><a href="little-endian.html">little-endian</a></b> format (depending,
   presumably, on a <b><a href="mode-bit.html">mode bit</a></b> somewhere).  See also <b><a href="NUXI-problem.html">NUXI problem</a></b>.
