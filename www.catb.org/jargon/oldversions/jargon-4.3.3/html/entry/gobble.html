<p><b>gobble</b> vt. <p>
 1. To consume, usu. used with `up'.  "The
   output spy gobbles characters out of a <b><a href="tty.html">tty</a></b> output buffer." 
   2. To obtain, usu. used with `down'.  "I guess I'll gobble down
   a copy of the documentation tomorrow."  See also <b><a href="snarf.html">snarf</a></b>.
