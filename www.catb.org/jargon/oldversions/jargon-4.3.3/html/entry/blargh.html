<p><b>blargh</b> /blarg/ n. <p>
 [MIT; now common] The opposite of
   <b><a href="ping.html">ping</a></b>, sense 5; an exclamation indicating that one has absorbed
   or is emitting a quantum of unhappiness.  Less common than
   <b><a href="ping.html">ping</a></b>.
