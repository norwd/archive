<p><b>jibble</b>  <p>
 [UK] Unspecified stuff.  An unspecified action.  A
   deliberately blank word; compare <b><a href="gorets.html">gorets</a></b>.  A deliberate experiment in
   tracking the spread of a near-meaningless word.  See
   <a href="http://www.jibble.org/jibblemeaning.php" target="_parent">http://www.jibble.org/jibblemeaning.php</a>.
