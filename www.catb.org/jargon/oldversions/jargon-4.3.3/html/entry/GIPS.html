<p><b>GIPS</b> /gips/ or /jips/ n. <p>
 [analogy with <b><a href="MIPS.html">MIPS</a></b>]
   Giga-Instructions per Second (also possibly `Gillions of
   Instructions per Second'; see <b><a href="gillion.html">gillion</a></b>).  In 1991, this is used
   of only a handful of highly parallel machines, but this is expected
   to change.  Compare <b><a href="KIPS.html">KIPS</a></b>.
