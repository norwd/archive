<p><b>netter</b> n. <p>
 1. Loosely, anyone with a <b><a href="network-address.html">network address</a></b>. 
   2. More specifically, a <b><a href="Usenet.html">Usenet</a></b> regular.  Most often found in
   the plural.  "If you post <em>that</em> in a technical group, you're
   going to be flamed by angry netters for the rest of time!"
