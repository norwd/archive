<p><b>shell out</b> vi. <p>
 [Unix] To <b><a href="spawn.html">spawn</a></b> an interactive
   subshell from within a program (e.g., a mailer or editor).  "Bang
   foo runs foo in a subshell, while bang alone shells out."
