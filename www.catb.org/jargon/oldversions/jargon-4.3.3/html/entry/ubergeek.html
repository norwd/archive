<p><b>ubergeek</b> n. /oo'ber-geek/ <p>
 [common; often spelled with
   initial &uuml;; from German &acute;'uber + <b><a href="geek.html">geek</a></b>] Almost synonymous with
   <b><a href="demigod.html">demigod</a></b>; used as a compliment of someone regarded as a paragon
   of <b><a href="geek.html">geek</a></b> achievement and virtue.
