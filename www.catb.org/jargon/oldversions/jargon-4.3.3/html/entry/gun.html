<p><b>gun</b> vt. <p>
 [ITS, now rare: from the <code>:GUN</code> command] To
   forcibly terminate a program or job (computer, not career).  "Some
   idiot left a background process running soaking up half the cycles,
   so I gunned it." Compare <b><a href="can.html">can</a></b>, <b><a href="blammo.html">blammo</a></b>.
