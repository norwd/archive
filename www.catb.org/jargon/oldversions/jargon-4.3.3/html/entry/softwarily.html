<p><b>softwarily</b> /soft-weir'i-lee/ adv. <p>
 In a way pertaining to
   software.  "The system is softwarily unreliable."  The adjective
   **`softwary' is <em>not</em> used.  See <b><a href="hardwarily.html">hardwarily</a></b>.
