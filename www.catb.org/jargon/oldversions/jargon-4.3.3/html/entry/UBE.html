<p><b>UBE</b> // n. <p>
 [abbrev., Unsolicited Bulk Email] A
   widespread, more formal term for email <b><a href="spam.html">spam</a></b>. Compare
   <b><a href="UCE.html">UCE</a></b>. The UBE term recognizes that spam is uttered by nonprofit
   and advocacy groups whose motives are not commercial.
