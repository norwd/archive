<p><b>card walloper</b> n. <p>
 An EDP programmer who grinds out batch
   programs that do stupid things like print people's paychecks. 
   Compare <b><a href="code-grinder.html">code grinder</a></b>.  See also <b><a href="punched-card.html">punched card</a></b>,
   <b><a href="eighty-column-mind.html">eighty-column mind</a></b>.
