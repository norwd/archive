<p><b>rare mode</b> adj. <p>
 [Unix] CBREAK mode (character-by-character
   with interrupts enabled).  Distinguished from <b><a href="raw-mode.html">raw mode</a></b> and
   <b><a href="cooked-mode.html">cooked mode</a></b>; the phrase "a sort of half-cooked (rare?) mode"
   is used in the V7/BSD manuals to describe the mode.  Usage: rare.
