<p><b>guru</b> n. <p>
 [Unix] An expert.  Implies not only <b><a href="wizard.html">wizard</a></b>
   skill but also a history of being a knowledge resource for others. 
   Less often, used (with a qualifier) for other experts on other
   systems, as in `VMS guru'.  See <b><a href="source-of-all-good-bits.html">source of all good bits</a></b>.
