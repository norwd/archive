<p><b>misbug</b> /mis-buhg/ n. <p>
 [MIT; rare (like its referent)]
   An unintended property of a program that turns out to be useful;
   something that should have been a <b><a href="bug.html">bug</a></b> but turns out to be a
   <b><a href="feature.html">feature</a></b>.  Compare <b><a href="green-lightning.html">green lightning</a></b>.  See <b><a href="miswart.html">miswart</a></b>.
