<p><b>rib site</b> n. <p>
 [by analogy with <b><a href="backbone-site.html">backbone site</a></b>] A machine
   that has an on-demand high-speed link to a <b><a href="backbone-site.html">backbone site</a></b> and
   serves as a regional distribution point for lots of third-party
   traffic in email and Usenet news.  Compare <b><a href="leaf-site.html">leaf site</a></b>,
   <b><a href="backbone-site.html">backbone site</a></b>.
