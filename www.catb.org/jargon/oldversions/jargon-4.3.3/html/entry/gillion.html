<p><b>gillion</b> /gil'y*n/ or /jil'y*n/ n. <p>
 [formed from
   <b><a href="giga-.html">giga-</a></b> by analogy with mega/million and tera/trillion]
   10^9. Same as an American billion or a British `milliard'. 
   How one pronounces this depends on whether one speaks <b><a href="giga-.html">giga-</a></b>
   with a hard or soft `g'.
