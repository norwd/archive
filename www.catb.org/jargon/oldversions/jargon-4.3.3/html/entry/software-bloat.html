<p><b>software bloat</b> n. <p>
 The results of <b><a href="second-system-effect.html">second-system effect</a></b>
   or <b><a href="creeping-featuritis.html">creeping featuritis</a></b>.  Commonly cited examples include
   <code>ls(1)</code>, <b><a href="X.html">X</a></b>, <b><a href="BSD.html">BSD</a></b>, and <b><a href="OS2.html">OS/2</a></b>.
