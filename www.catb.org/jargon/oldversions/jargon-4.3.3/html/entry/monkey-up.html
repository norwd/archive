<p><b>monkey up</b> vt. <p>
 To hack together hardware for a particular
   task, especially a one-shot job.  Connotes an extremely <b><a href="crufty.html">crufty</a></b>
   and consciously temporary solution.  Compare <b><a href="hack-up.html">hack up</a></b>,
   <b><a href="kluge-up.html">kluge up</a></b>, <b><a href="cruft-together.html">cruft together</a></b>.
