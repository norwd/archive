<p><b>Spinning Pizza of Death</b> n. <p>
 [OS X; common] The
   quartered-circle busy indicator on Mac OS X. It is analogous to the
   Microsoft Windows hourglass, but OS X 10.0's legendary slowness
   under the Aqua toolkit makes it rather more evocative.  See
   <b><a href="Death-X-of.html">Death X of</a></b>.
