<p><b>Pentagram Pro</b> n. <p>
  A humorous corruption of "Pentium
   Pro", with a Satanic reference, implying that the chip is
   inherently <b><a href="evil.html">evil</a></b>. Often used with "666 MHz"; there is a
   T-shirt.  See <b><a href="Pentium.html">Pentium</a></b>
