<p><b>munch</b> vt. <p>
 [often confused with <b><a href="mung.html">mung</a></b>, q.v.] To
   transform information in a serial fashion, often requiring large
   amounts of computation.  To trace down a data structure.  Related
   to <b><a href="crunch.html">crunch</a></b> and nearly synonymous with <b><a href="grovel.html">grovel</a></b>, but connotes
   less pain.
