<p><b>clobber</b> vt. <p>
 To overwrite, usually unintentionally: "I
   walked off the end of the array and clobbered the stack."  Compare
   <b><a href="mung.html">mung</a></b>, <b><a href="scribble.html">scribble</a></b>, <b><a href="trash.html">trash</a></b>, and <b><a href="smash-the-stack.html">smash the stack</a></b>.
