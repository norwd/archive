<p><b>Aunt Tillie</b>  n. <p>
 [linux-kernel mailing list] The
   archetypal non-technical user, one's elderly and scatterbrained
   maiden aunt.  Invoked in discussions of usability for people
   who are not hackers and geeks; one sees references to the "Aunt
   Tillie test".
