<p><b>raster burn</b> n. <p>
 Eyestrain brought on by too many hours of
   looking at low-res, poorly tuned, or glare-ridden monitors, esp. 
   graphics monitors.  See <b><a href="terminal-illness.html">terminal illness</a></b>.
