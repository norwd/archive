<p><b>K</b> /K/ n. <p>
 [from <b><a href="kilo-.html">kilo-</a></b>] A kilobyte.  Used both as a
   spoken word and a written suffix (like <b><a href="meg.html">meg</a></b> and <b><a href="gig.html">gig</a></b> for
   megabyte and gigabyte).  See <b><a href="quantifiers.html">quantifiers</a></b>.
