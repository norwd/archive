<p><b>fat pipe</b> <p>
 A high-bandwidth connection to the Internet. When
   the term gained currency in the mid-1990s, a T-1 (at 1.5
   Mbits/second) was considered a fat pipe, but the standard has
   risen.  Now it suggests multiple T3s.
