<p><b>newsfroup</b> // n. <p>
 [Usenet] Silly synonym for
   <b><a href="newsgroup.html">newsgroup</a></b>, originally a typo but now in regular use on
   Usenet's talk.bizarre, and other lunatic-fringe groups.  Compare
   <b><a href="hing.html">hing</a></b>, <b><a href="grilf.html">grilf</a></b>, <b><a href="pr0n.html">pr0n</a></b> and <b><a href="filk.html">filk</a></b>.
