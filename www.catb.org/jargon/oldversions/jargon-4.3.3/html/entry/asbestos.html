<p><b>asbestos</b> adj. <p>
 [common] Used as a modifier to anything
   intended to protect one from <b><a href="flame.html">flame</a></b>s; also in other highly
   <b><a href="flame.html">flame</a></b>-suggestive usages.  See, for example, <b><a href="asbestos-longjohns.html">asbestos longjohns</a></b> and <b><a href="asbestos-cork-award.html">asbestos cork award</a></b>.
