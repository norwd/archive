<p><b>BWQ</b> /B-W-Q/ n. <p>
 [IBM: abbreviation, `Buzz Word Quotient']
   The percentage of buzzwords in a speech or documents.  Usually
   roughly proportional to <b><a href="bogosity.html">bogosity</a></b>.  See <b><a href="TLA.html">TLA</a></b>.
