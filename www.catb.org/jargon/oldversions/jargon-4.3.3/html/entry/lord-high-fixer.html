<p><b>lord high fixer</b> n. <p>
 [primarily British, from Gilbert &amp;
   Sullivan's `lord high executioner'] The person in an organization
   who knows the most about some aspect of a system.  See <b><a href="wizard.html">wizard</a></b>.
