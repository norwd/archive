<p><b>splork!</b>  <p>
 [Usenet; common] The sound of coffee (or other
   beverage) hitting the monitor and/or keyboard after being forced
   out of the mouth via the nose.  It usually follows an unexpectedly
   funny thing in a Usenet post.  Compare <b><a href="snarf.html">snarf</a></b>.
