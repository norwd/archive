<p><b>dispress</b> vt. <p>
 [contraction of `Dissociated Press' due to
   eight-character MS-DOS filenames] To apply the <b><a href="Dissociated-Press.html">Dissociated Press</a></b>
   algorithm to a block of text. The resultant output is also referred to
   as a 'dispression'.
