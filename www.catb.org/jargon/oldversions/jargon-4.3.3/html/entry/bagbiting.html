<p><b>bagbiting</b> adj. <p>
 Having the quality of a <b><a href="bagbiter.html">bagbiter</a></b>. 
   "This bagbiting system won't let me compute the factorial of a
   negative number."  Compare <b><a href="losing.html">losing</a></b>, <b><a href="cretinous.html">cretinous</a></b>,
   <b><a href="bletcherous.html">bletcherous</a></b>, `barfucious' (under <b><a href="barfulous.html">barfulous</a></b>) and
   `chomping' (under <b><a href="chomp.html">chomp</a></b>).
