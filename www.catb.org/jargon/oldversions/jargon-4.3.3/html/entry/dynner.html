<p><b>dynner</b> /din'r/ n. <p>
 32 bits, by analogy with <b><a href="nybble.html">nybble</a></b> and
   <b><a href="byte.html">byte</a></b>.  Usage: rare and extremely silly.  See also <b><a href="playte.html">playte</a></b>,
