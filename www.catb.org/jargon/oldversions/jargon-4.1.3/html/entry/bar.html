<p><b>bar</b> /bar/ n. <p>
 1. [very common] The second
   <b><a href="metasyntactic-variable.html">metasyntactic variable</a></b>, after <b><a href="foo.html">foo</a></b> and before <b><a href="baz.html">baz</a></b>. 
   "Suppose we have two functions: FOO and BAR.  FOO calls
   BAR<small>...</small>." 2. Often appended to <b><a href="foo.html">foo</a></b> to produce
   <b><a href="foobar.html">foobar</a></b>.
