<p><b>read-only user</b> n. <p>
 Describes a <b><a href="luser.html">luser</a></b> who uses computers
   almost exclusively for reading Usenet, bulletin boards, and/or
   email, rather than writing code or purveying useful information. 
   See <b><a href="twink.html">twink</a></b>, <b><a href="terminal-junkie.html">terminal junkie</a></b>, <b><a href="lurker.html">lurker</a></b>.
