<p><b>120 reset</b> /wuhn-twen'tee ree'set/ n. <p>
 [from 120 volts,
   U.S. wall voltage] To cycle power on a machine in order to reset or
   unjam it.  Compare <b><a href="Big-Red-Switch.html">Big Red Switch</a></b>, <b><a href="power-cycle.html">power cycle</a></b>.
