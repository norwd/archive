<p><b>weeble</b> /weeb'l/ interj. <p>
 [Cambridge] Used to denote
   frustration, usually at amazing stupidity.  "I stuck the disk in
   upside down."  "Weeble<small>...</small>." Compare <b><a href="gurfle.html">gurfle</a></b>.
