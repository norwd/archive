<p><b>Lintel</b> n. <p>
 The emerging <b><a href="Linux.html">Linux</a></b>/Intel alliance.  This term
   began to be used in early 1999 after it became clear that the
   <b><a href="Wintel.html">Wintel</a></b> alliance was under increasing strain and Intel started
   taking stakes in Linux companies.
