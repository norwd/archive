<p><b>fuel up</b> vi. <p>
 To eat or drink hurriedly in order to get back
   to hacking.  "Food-p?"  "Yeah, let's fuel up."  "Time for a
   <b><a href="great-wall.html">great-wall</a></b>!"  See also <b><a href="oriental-food.html">oriental food</a></b>.
