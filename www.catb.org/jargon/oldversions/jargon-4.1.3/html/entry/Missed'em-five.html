<p><b>Missed'em-five</b> n. <p>
 Pejorative hackerism for AT&T System V
   Unix, generally used by <b><a href="BSD.html">BSD</a></b> partisans in a bigoted mood.  (The
   synonym `SysVile' is also encountered.)  See <b><a href="software-bloat.html">software bloat</a></b>,
   <b><a href="Berzerkeley.html">Berzerkeley</a></b>.
