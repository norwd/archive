<p><b>gurfle</b> /ger'fl/ interj. <p>
 An expression of shocked
   disbelief.  "He said we have to recode this thing in FORTRAN by
   next week.  Gurfle!"  Compare <b><a href="weeble.html">weeble</a></b>.
