<p><b>page in</b> v. <p>
 [MIT] 1. To become aware of one's surroundings
   again after having paged out (see <b><a href="pageout.html">page out</a></b>).  Usually confined
   to the sarcastic comment: "Eric pages in, <b><a href="filmat11.html">film at 11</a></b>!" 
   2. Syn. `swap in'; see <b><a href="swap.html">swap</a></b>.
