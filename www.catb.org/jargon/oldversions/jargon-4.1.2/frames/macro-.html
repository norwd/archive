<p><b>macro-</b> pref. <p>
 Large.  Opposite of <b><a href="micro-.html">micro-</a></b>.  In the
   mainstream and among other technical cultures (for example, medical
   people) this competes with the prefix <b><a href="mega-.html">mega-</a></b>, but hackers tend
   to restrict the latter to quantification.
