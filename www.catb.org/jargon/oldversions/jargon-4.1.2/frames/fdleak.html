<p><b>fd leak</b> /F-D leek/ n. <p>
 A kind of programming bug analogous
   to a <b><a href="coreleak.html">core leak</a></b>, in which a program fails to close file
   descriptors (`fd's) after file operations are completed, and
   thus eventually runs out of them.  See <b><a href="leak.html">leak</a></b>.
