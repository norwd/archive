<p><b>asbestos</b> adj. <p>
 [common] Used as a modifier to anything
   intended to protect one from <b><a href="flame.html">flame</a></b>s; also in other highly
   <b><a href="flame.html">flame</a></b>-suggestive usages.  See, for example, <b><a href="asbestoslongjohns.html">asbestos longjohns</a></b> and <b><a href="asbestoscorkaward.html">asbestos cork award</a></b>.
