<p><b>monkey up</b> vt. <p>
 To hack together hardware for a particular
   task, especially a one-shot job.  Connotes an extremely <b><a href="crufty.html">crufty</a></b>
   and consciously temporary solution.  Compare <b><a href="hackup.html">hack up</a></b>,
   <b><a href="klugeup.html">kluge up</a></b>, <b><a href="crufttogether.html">cruft together</a></b>.
