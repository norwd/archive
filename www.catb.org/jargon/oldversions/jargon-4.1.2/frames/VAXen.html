<p><b>VAXen</b> /vak'sn/ n. <p>
 [from `oxen', perhaps influenced by
   `vixen'] (alt. `vaxen') The plural canonically used among
   hackers for the <b><a href="DEC.html">DEC</a></b> VAX computers.  "Our installation has four
   PDP-10s and twenty vaxen."  See <b><a href="boxen.html">boxen</a></b>.
