<p><b>snarf down</b> v. <p>
 To <b><a href="snarf.html">snarf</a></b>, with the connotation of
   absorbing, processing, or understanding.  "I'll snarf down the
   latest version of the <b><a href="nethack.html">nethack</a></b> user's guide -- it's been a
   while since I played last and I don't know what's changed
   recently."
