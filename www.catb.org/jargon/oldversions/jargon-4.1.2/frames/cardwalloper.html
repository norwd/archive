<p><b>card walloper</b> n. <p>
 An EDP programmer who grinds out batch
   programs that do stupid things like print people's paychecks. 
   Compare <b><a href="codegrinder.html">code grinder</a></b>.  See also <b><a href="punchedcard.html">punched card</a></b>,
   <b><a href="eighty-columnmind.html">eighty-column mind</a></b>.
