<p><b>tits on a keyboard</b> n. <p>
 Small bumps on certain keycaps to
   keep touch-typists registered (usually on the <code>5</code> of a numeric
   keypad, and on the <code>F</code> and <code>J</code> of a <b><a href="QWERTY.html">QWERTY</a></b> keyboard;
   but the Mac, perverse as usual, has them on the <code>D</code> and
   <code>K</code> keys).
