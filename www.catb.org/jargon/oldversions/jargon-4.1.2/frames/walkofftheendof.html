<p><b>walk off the end of</b> vt. <p>
 To run past the end of an array,
   list, or medium after stepping through it -- a good way to land in
   trouble.  Often the result of an <b><a href="off-by-oneerror.html">off-by-one error</a></b>.  Compare
   <b><a href="clobber.html">clobber</a></b>, <b><a href="roach.html">roach</a></b>, <b><a href="smashthestack.html">smash the stack</a></b>.
