<p><b>nroff</b> /N'rof/ <p>
 n. [Unix, from "new roff" (see
   <b><a href="troff.html">troff</a></b>)] A companion program to the Unix typesetter <b><a href="troff.html">troff</a></b>,
   accepting identical input but preparing output for terminals and
   line printers.
