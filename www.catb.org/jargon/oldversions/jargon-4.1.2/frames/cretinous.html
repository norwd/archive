<p><b>cretinous</b> /kret'n-*s/ or /kreet'n-*s/ adj. <p>
 Wrong;
   stupid; non-functional; very poorly designed.  Also used
   pejoratively of people.  See <b><a href="dreadhigh-bitdisease.html">dread high-bit disease</a></b> for an
   example.  Approximate synonyms: <b><a href="bletcherous.html">bletcherous</a></b>, <b><a href="bagbiting.html">bagbiting</a></b>
   <b><a href="losing.html">losing</a></b>, <b><a href="brain-damaged.html">brain-damaged</a></b>.
