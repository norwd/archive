<p><b>bletch</b> /blech/ interj. <p>
 [very common; from
   Yiddish/German `brechen', to vomit, poss.  via comic-strip
   exclamation `blech'] Term of disgust.  Often used in "Ugh,
   bletch".  Compare <b><a href="barf.html">barf</a></b>.
