<p><b>Gosperism</b> /gos'p*r-izm/ n. <p>
 A hack, invention, or
   saying due to <b><a href="elderdays.html">elder days</a></b> arch-hacker R. William (Bill) Gosper. 
   This notion merits its own term because there are so many of them. 
   Many of the entries in <b><a href="HAKMEM.html">HAKMEM</a></b> are Gosperisms; see also
   <b><a href="life.html">life</a></b>.
