<p><b>blow up</b> vi. <p>
 1. [scientific computation] To become unstable. 
   Suggests that the computation is diverging so rapidly that it will
   soon overflow or at least go <b><a href="nonlinear.html">nonlinear</a></b>.  2.  Syn. <b><a href="blowout.html">blow out</a></b>.
