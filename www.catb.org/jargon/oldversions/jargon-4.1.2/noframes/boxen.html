<p><b>boxen</b> /bok'sn/ pl.n. <p>
 [very common; by analogy with
   <b><a href="VAXen.html">VAXen</a></b>] Fanciful plural of <b><a href="box.html">box</a></b> often encountered in the
   phrase `Unix boxen', used to describe commodity <b><a href="Unix.html">Unix</a></b>
   hardware.  The connotation is that any two Unix boxen are
   interchangeable.
