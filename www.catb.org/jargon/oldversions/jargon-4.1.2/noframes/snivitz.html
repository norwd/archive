<p><b>snivitz</b> /sniv'itz/ n. <p>
 A hiccup in hardware or software; a
   small, transient problem of unknown origin (less serious than a
   <b><a href="snark.html">snark</a></b>).  Compare <b><a href="glitch.html">glitch</a></b>.
