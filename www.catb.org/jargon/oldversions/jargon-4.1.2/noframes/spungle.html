<p><b>spungle</b> n. <p>
 [Durham, UK; portmanteau, <b><a href="spangle.html">spangle</a></b> +
   bungle] A <b><a href="spangle.html">spangle</a></b> of no actual usefulness. Example: Roger the
   Bent Paperclip in Microsoft Word '98.  A spungle's only virtue is
   that it looks pretty, unless you find creeping featurism ugly.
