<p><b>raster blaster</b> n. <p>

   <b><a href="bitblt.html">bitblt</a></b> operations (a <b><a href="blitter.html">blitter</a></b>).  Allegedly inspired by

   Americans call a `boom box' or `ghetto blaster'.
