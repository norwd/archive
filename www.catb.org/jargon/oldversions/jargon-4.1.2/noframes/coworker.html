<p><b>cow orker</b> n. <p>
 [Usenet] n. fortuitous typo for co-worker,
   widely used in Usenet, with perhaps a hint that orking cows is
   illegal.  Some people believe this was coined by Scott Adams, the
   creator of <b><a href="Dilbert.html">Dilbert</a></b>. Compare <b><a href="hing.html">hing</a></b>, <b><a href="grilf.html">grilf</a></b>, <b><a href="filk.html">filk</a></b>,
   <b><a href="newsfroup.html">newsfroup</a></b>.
