<p><b>KISS Principle</b> /kis' prin'si-pl/ n. <p>
 "Keep It Simple,
   Stupid".  A maxim often invoked when discussing design to fend off
   <b><a href="creepingfeaturism.html">creeping featurism</a></b> and control development complexity. 
   Possibly related to the <b><a href="marketroid.html">marketroid</a></b> maxim on sales
   presentations, "Keep It Short and Simple".
