<p><b>page out</b> vi. <p>
 [MIT] 1. To become unaware of one's
   surroundings temporarily, due to daydreaming or preoccupation. 
   "Can you repeat that?  I paged out for a minute."  See <b><a href="pagein.html">page in</a></b>.  Compare <b><a href="glitch.html">glitch</a></b>, <b><a href="thinko.html">thinko</a></b>.  2. Syn. `swap out'; see
   <b><a href="swap.html">swap</a></b>.
