<p><b>asbestos longjohns</b> n. <p>
 Notional garments donned by
   <b><a href="Usenet.html">Usenet</a></b> posters just before emitting a remark they expect will
   elicit <b><a href="flamage.html">flamage</a></b>.  This is the most common of the <b><a href="asbestos.html">asbestos</a></b>
   coinages.  Also `asbestos underwear', `asbestos overcoat', etc.
