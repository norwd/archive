<p><b>bot spot</b> n. <p>
 [MUD, IRC] The user on a MUD with the
   longest connect time.  Derives from the fact that <b><a href="bot.html">bot</a></b>s on MUDS
   often stay constantly connected and appear at the bottom of the
   list.
