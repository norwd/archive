<p><b>black magic</b> n. <p>
 [common] A technique that works, though
   nobody really understands why.  More obscure than <b><a href="voodooprogramming.html">voodoo programming</a></b>, which may be done by cookbook.  Compare also
   <b><a href="blackart.html">black art</a></b>, <b><a href="deepmagic.html">deep magic</a></b>, and <b><a href="magicnumber.html">magic number</a></b> (sense 2).
