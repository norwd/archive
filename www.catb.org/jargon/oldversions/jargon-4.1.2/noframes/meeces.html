<p><b>meeces</b> /mees'*z/ n. <p>
 [TMRC] Occasional furry visitors who
   are not <b><a href="urchin.html">urchin</a></b>s.  [That is, mice. This may no longer be in
   live use; it clearly derives from the refrain of the early-1960s
   cartoon character Mr. Jinx: "I hate meeces to <em>pieces</em>!" --
   ESR]
