<p><b>PM</b> /P-M/ <p>
 1. v. (from `preventive maintenance') To
   bring down a machine for inspection or test purposes.  See
   <b><a href="provocativemaintenance.html">provocative maintenance</a></b>; see also <b><a href="scratchmonkey.html">scratch monkey</a></b>. 
   2. n. Abbrev. for `Presentation Manager', an <b><a href="elephantine.html">elephantine</a></b> OS/2
   graphical user interface.
