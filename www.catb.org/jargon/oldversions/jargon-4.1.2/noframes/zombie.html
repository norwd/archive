<p><b>zombie</b> n. <p>
 [Unix] A process that has died but has not yet
   relinquished its process table slot (because the parent process
   hasn't executed a <code>wait(2)</code> for it yet).  These can be seen in
   <code>ps(1)</code> listings occasionally.  Compare <b><a href="orphan.html">orphan</a></b>.
