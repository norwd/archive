<p><b>nanobot</b> /nan'oh-bot/ n. <p>
 A robot of microscopic
   proportions, presumably built by means of <b><a href="nanotechnology.html">nanotechnology</a></b>.  As
   yet, only used informally (and speculatively!).  Also called a
   `nanoagent'.
