<p><b>stiffy</b> n. <p>
 [University of Lowell, Massachusetts.] 3.5-inch
   <b><a href="microfloppies.html">microfloppies</a></b>, so called because their jackets are more rigid
   than those of the 5.25-inch and the (now totally obsolete) 8-inch
   floppy.  Elsewhere this might be called a `firmy'.
