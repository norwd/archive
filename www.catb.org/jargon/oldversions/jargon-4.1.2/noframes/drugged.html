<p><b>drugged</b> adj. <p>
 (also `on drugs') 1. Conspicuously stupid,
   heading toward <b><a href="brain-damaged.html">brain-damaged</a></b>.  Often accompanied by a
   pantomime of toking a joint.  2. Of hardware, very slow relative to
   normal performance.
