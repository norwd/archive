<p><b>crudware</b> /kruhd'weir/ n. <p>
 Pejorative term for the hundreds
   of megabytes of low-quality <b><a href="freeware.html">freeware</a></b> circulated by user's
   groups and BBS systems in the micro-hobbyist world.  "Yet
   <em>another</em> set of disk catalog utilities for <b><a href="MS-DOS.html">MS-DOS</a></b>? 
   What crudware!"
