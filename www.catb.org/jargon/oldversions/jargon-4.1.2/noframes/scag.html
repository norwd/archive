<p>

<p><b>scag</b> vt. <p>
 To destroy the data on a disk, either by
   corrupting the
  filesystem or by causing media damage.  "That last power hit scagged
  the system disk."  Compare <b><a href="scrog.html">scrog</a></b>, <b><a href="roach.html">roach</a></b>.
