<p><b>netdead</b> n. <p>
 [IRC] The state of someone who signs off
   <b><a href="IRC.html">IRC</a></b>, perhaps during a <b><a href="netburp.html">netburp</a></b>, and doesn't sign back on
   until later.  In the interim, he is "dead to the net". 
   Compare <b><a href="link-dead.html">link-dead</a></b>.
