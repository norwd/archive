<p><b>nanofortnight</b> n. <p>

   * 10^(-9), or about 1.2 msec.  This unit was used

   <b><a href="microfortnight.html">microfortnight</a></b>, <b><a href="attoparsec.html">attoparsec</a></b>, and <b><a href="micro-.html">micro-</a></b>.
