<p><b>lexiphage</b> /lek'si-fayj`/ n. <p>
 A notorious word <b><a href="chomper.html">chomper</a></b>
   on ITS.  See <b><a href="bagbiter.html">bagbiter</a></b>.  This program would draw on a selected
   victim's bitmapped terminal the words "THE BAG" in ornate
   letters, followed a pair of jaws biting pieces of it off.
