<p><b>404</b> // n. <p>
 [from the HTTP error "file not found on
   server"]  Extended to humans to convey that the subject has no
   idea or no clue - sapience not found.  May be used reflexively;
   "Uh, I'm 404ing" means "I'm drawing a blank".
