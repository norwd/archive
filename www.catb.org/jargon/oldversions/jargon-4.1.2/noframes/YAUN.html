<p><b>YAUN</b> /yawn/ n. <p>
 [Acronym for `Yet Another Unix Nerd']
   Reported from the San Diego Computer Society (predominantly a
   microcomputer users' group) as a good-natured punning insult aimed
   at Unix zealots.
