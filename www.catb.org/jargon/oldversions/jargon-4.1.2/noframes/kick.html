<p>

<p><b>kick</b> v. <p>
 [IRC] To cause somebody to be removed from a
   <b><a href="IRC.html">IRC</a></b> channel, an option only available to channel ops.  This is
   an extreme measure, often used to combat extreme <b><a href="flamage.html">flamage</a></b> or
   <b><a href="flood.html">flood</a></b>ing, but sometimes used at the chop's whim.  Compare
   <b><a href="gun.html">gun</a></b>.
