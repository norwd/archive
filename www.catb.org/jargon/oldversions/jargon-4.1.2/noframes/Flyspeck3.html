<p><b>Flyspeck 3</b> n. <p>
 Standard name for any font that is so tiny as
   to be unreadable (by analogy with names like `Helvetica 10' for
   10-point Helvetica).  Legal boilerplate is usually printed in
   Flyspeck 3.
