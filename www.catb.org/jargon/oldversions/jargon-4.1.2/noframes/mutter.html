<p><b>mutter</b> vt. <p>
 To quietly enter a command not meant for the
   ears, eyes, or fingers of ordinary mortals.  Often used in `mutter
   an <b><a href="incantation.html">incantation</a></b>'.  See also <b><a href="wizard.html">wizard</a></b>.
