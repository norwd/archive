<B>dumbass attack</B> /duhm'as *-tak'/ n. <P> [Purdue] Notional
   cause of a novice's mistake made by the experienced, especially one
   made while running as  <A HREF="../R/root.html">root</A> under Unix, e.g., typing <CODE>rm
   -r *</CODE> or <CODE>mkfs</CODE> on a mounted file system.  Compare  <A HREF="../A/adger.html">adger</A>.  <P>
