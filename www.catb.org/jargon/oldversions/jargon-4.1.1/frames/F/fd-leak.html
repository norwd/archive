<P>
<B>fd leak</B> /F-D leek/ n. <P> A kind of programming bug analogous
   to a  <A HREF="../C/core-leak.html">core leak</A>, in which a program fails to close file
   descriptors (`fd's) after file operations are completed, and
   thus eventually runs out of them.  See  <A HREF="../L/leak.html">leak</A>.  <P>
