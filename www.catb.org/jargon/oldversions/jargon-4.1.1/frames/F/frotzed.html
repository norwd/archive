<B>frotzed</B> /frotst/ adj. <P>  <A HREF="../D/down.html">down</A> because of hardware
   problems.  Compare  <A HREF="../F/fried.html">fried</A>.  A machine that is merely frotzed
   may be fixable without replacing parts, but a fried machine is more
   seriously damaged.  <P>
