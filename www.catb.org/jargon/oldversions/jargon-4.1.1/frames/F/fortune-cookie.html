<B>fortune cookie</B> n. <P> [WAITS, via Unix; common] A random
   quote, item of trivia, joke, or maxim printed to the user's tty at
   login time or (less commonly) at logout time.  Items from this
   lexicon have often been used as fortune cookies.  See  <A HREF="../C/cookie-file.html">cookie file</A>.  <P>
