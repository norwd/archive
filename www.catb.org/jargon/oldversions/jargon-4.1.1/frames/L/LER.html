<P>
<B>LER</B> /L-E-R/ <P> n. 1. [TMRC, from `Light-Emitting Diode']
   A light-emitting resistor (that is, one in the process of burning
   up).  Ohm's law was broken.  See also  <A HREF="../S/SED.html">SED</A>. 2. An incandescent
   light bulb (the filament emits light because it's resistively
   heated).  <P>
