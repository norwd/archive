<B>Lintel</B> n. <P> The emerging  <A HREF="../L/linux.html">Linux</A>/Intel alliance.  This term
   began to be used in early 1999 after it became clear that the
    <A HREF="../W/wintel.html">Wintel</A> alliance was under increasing strain and Intel started 
   taking stakes in Linux companies. <P>
