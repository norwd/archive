<B>mutter</B> vt. <P> To quietly enter a command not meant for the
   ears, eyes, or fingers of ordinary mortals.  Often used in `mutter
   an  <A HREF="../I/incantation.html">incantation</A>'.  See also  <A HREF="../W/wizard.html">wizard</A>.
