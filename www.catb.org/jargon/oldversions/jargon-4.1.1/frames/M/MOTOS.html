<B>MOTOS</B> /moh-tohs/ n. <P> [acronym from the 1970 U.S. census
   forms via Usenet: Member Of The Opposite Sex] A potential or (less
   often) actual sex partner.  See  <A HREF="../M/MOTAS.html">MOTAS</A>,  <A HREF="../M/MOTSS.html">MOTSS</A>,  <A HREF="../S/SO.html">SO</A>.
   Less common than MOTSS or  <A HREF="../M/MOTAS.html">MOTAS</A>, which has largely displaced
   it.  <P>
