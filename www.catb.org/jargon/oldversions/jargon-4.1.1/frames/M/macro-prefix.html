<B>macro-</B> pref. <P> Large.  Opposite of  <A HREF="../M/micro-prefix.html">micro-</A>.  In the
   mainstream and among other technical cultures (for example, medical
   people) this competes with the prefix  <A HREF="../M/mega-prefix.html">mega-</A>, but hackers tend
   to restrict the latter to quantification.  <P>
