<B>mangle</B> vt. <P> 1. Used similarly to  <A HREF="../M/mung.html">mung</A> or  <A HREF="../S/scribble.html">scribble</A>,
   but more violent in its connotations; something that is mangled has
   been irreversibly and totally trashed. 2. To produce the  <A HREF="../M/mangled-name.html">mangled name</A> corresponding to a C++ declaration. <P>
