<B>misbug</B> /mis-buhg/ n. <P> [MIT] An unintended property of a
   program that turns out to be useful; something that should have
   been a  <A HREF="../B/bug.html">bug</A> but turns out to be a  <A HREF="../F/feature.html">feature</A>.  Usage: rare.
   Compare  <A HREF="../G/green-lightning.html">green lightning</A>.  See  <A HREF="../M/miswart.html">miswart</A>.  <P>
