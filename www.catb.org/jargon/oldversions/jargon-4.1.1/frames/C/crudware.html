<B>crudware</B> /kruhd'weir/ n. <P> Pejorative term for the hundreds
   of megabytes of low-quality  <A HREF="../F/freeware.html">freeware</A> circulated by user's
   groups and BBS systems in the micro-hobbyist world.  "Yet
   <EM>another</EM> set of disk catalog utilities for  <A HREF="../M/ms-dos.html">MS-DOS</A>?
   What crudware!" <P>
