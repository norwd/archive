<B>asbestos longjohns</B> n. <P> Notional garments donned by
    <A HREF="../U/usenet.html">Usenet</A> posters just before emitting a remark they expect will
   elicit  <A HREF="../F/flamage.html">flamage</A>.  This is the most common of the  <A HREF="../A/asbestos.html">asbestos</A>
   coinages.  Also `asbestos underwear', `asbestos overcoat', etc.  <P>
