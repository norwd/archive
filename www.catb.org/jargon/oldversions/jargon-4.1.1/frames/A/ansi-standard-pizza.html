<B>ANSI standard pizza</B> /an'see stan'd*rd peet'z*/ <P> [CMU]
   Pepperoni and mushroom pizza.  Coined allegedly because most pizzas
   ordered by CMU hackers during some period leading up to mid-1990
   were of that flavor.  See also  <A HREF="../R/rotary-debugger.html">rotary debugger</A>; compare
