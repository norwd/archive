<B>rib site</B> n. <P> [by analogy with  <A HREF="../B/backbone-site.html">backbone site</A>] A machine
   that has an on-demand high-speed link to a  <A HREF="../B/backbone-site.html">backbone site</A> and
   serves as a regional distribution point for lots of third-party
   traffic in email and Usenet news.  Compare  <A HREF="../L/leaf-site.html">leaf site</A>,
    <A HREF="../B/backbone-site.html">backbone site</A>.  <P>
