<B>rare mode</B> adj. <P> [Unix] CBREAK mode (character-by-character
   with interrupts enabled).  Distinguished from  <A HREF="../R/raw-mode.html">raw mode</A> and
    <A HREF="../C/cooked-mode.html">cooked mode</A>; the phrase "a sort of half-cooked (rare?) mode"
   is used in the V7/BSD manuals to describe the mode.  Usage: rare.  <P>
