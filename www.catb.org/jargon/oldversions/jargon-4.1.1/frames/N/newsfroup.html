<B>newsfroup</B> // n. <P> [Usenet] Silly synonym for
    <A HREF="../N/newsgroup.html">newsgroup</A>, originally a typo but now in regular use on
   Usenet's talk.bizarre, and other lunatic-fringe groups.  Compare
    <A HREF="../H/hing.html">hing</A>,  <A HREF="../G/grilf.html">grilf</A>,  <A HREF="../P/pr0n.html">pr0n</A> and  <A HREF="../F/filk.html">filk</A>.  <P>
