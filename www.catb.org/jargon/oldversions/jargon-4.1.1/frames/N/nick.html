<B>nick</B> n. <P> [IRC; very common] Short for nickname.  On
    <A HREF="../I/IRC.html">IRC</A>, every user must pick a nick, which is sometimes the same
   as the user's real name or login name, but is often more fanciful.
   Compare  <A HREF="../H/handle.html">handle</A>,  <A HREF="../S/screen-name.html">screen name</A>.  <P>
