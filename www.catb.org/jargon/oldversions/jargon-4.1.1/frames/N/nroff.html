<B>nroff</B> /N'rof/ <P> n. [Unix, from "new roff" (see
    <A HREF="../T/troff.html">troff</A>)] A companion program to the Unix typesetter  <A HREF="../T/troff.html">troff</A>,
   accepting identical input but preparing output for terminals and
   line printers.  <P>
