<B>tweeter</B> n. <P> [University of Waterloo] Syn.  <A HREF="../P/perf.html">perf</A>,
    <A HREF="../C/chad.html">chad</A> (sense 1).  This term (like  <A HREF="../W/woofer.html">woofer</A>) has been in use
   at Waterloo since 1972 but is elsewhere unknown.  In audio jargon,
   the word refers to the treble speaker(s) on a hi-fi.  <P>
