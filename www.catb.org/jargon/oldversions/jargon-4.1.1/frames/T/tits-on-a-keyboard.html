<P>
<B>tits on a keyboard</B> n. <P> Small bumps on certain keycaps to
   keep touch-typists registered (usually on the <SAMP>`5'</SAMP> of a numeric
   keypad, and on the <SAMP>`F'</SAMP> and <SAMP>`J'</SAMP> of a  <A HREF="../Q/QWERTY.html">QWERTY</A> keyboard;
   but the Mac, perverse as usual, has them on the <SAMP>`D'</SAMP> and
   <SAMP>`K'</SAMP> keys).  <P>
