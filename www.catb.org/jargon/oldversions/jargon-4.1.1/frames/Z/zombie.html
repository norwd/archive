<B>zombie</B> n. <P> [Unix] A process that has died but has not yet
   relinquished its process table slot (because the parent process
   hasn't executed a <CODE>wait(2)</CODE> for it yet).  These can be seen in
   <CODE>ps(1)</CODE> listings occasionally.  Compare  <A HREF="../O/orphan.html">orphan</A>.  <P>
