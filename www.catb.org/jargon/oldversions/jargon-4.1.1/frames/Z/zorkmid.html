<B>zorkmid</B> /zork'mid/ n. <P> The canonical unit of currency in
   hacker-written games.  This originated in  <A HREF="../Z/zork.html">Zork</A> but has spread
   to  <A HREF="../N/nethack.html">nethack</A> and is referred to in several other games.  <P>
