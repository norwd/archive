<B>gun</B> vt. <P> [ITS, now rare: from the <CODE>:GUN</CODE> command]
   To forcibly terminate a program or job (computer, not career).
   "Some idiot left a background process running soaking up half the
   cycles, so I gunned it."  Usage: now rare.  Compare  <A HREF="../C/can.html">can</A>,
    <A HREF="../B/blammo.html">blammo</A>.  <P>
