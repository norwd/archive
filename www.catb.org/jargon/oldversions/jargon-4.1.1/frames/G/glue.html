<P>
<B>glue</B> n. <P> Generic term for any interface logic or protocol
   that connects two component blocks.  For example,  <A HREF="../B/blue-glue.html">Blue Glue</A> is
   IBM's SNA protocol, and hardware designers call anything used to
   connect large VLSI's or circuit blocks `glue logic'.  <P>
