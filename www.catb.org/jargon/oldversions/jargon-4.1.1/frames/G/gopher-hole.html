<B>gopher hole</B> n. <P> 1. Any access to a  <A HREF="../G/gopher.html">gopher</A>.  2. [Amateur
   Packet Radio] The terrestrial analog of a  <A HREF="../W/wormhole.html">wormhole</A> (sense
   2), from which this term was coined.  A gopher hole links two
   amateur packet relays through some non-ham radio medium. <P>
