<B>gonkulator</B> /gon'kyoo-lay-tr/ n. <P> [common; from the 1960s
   "Hogan's Heroes" TV series] A pretentious piece of equipment
   that actually serves no useful purpose.  Usually used to describe
   one's least favorite piece of computer hardware.  See  <A HREF="../G/gonk.html">gonk</A>.  <P>
