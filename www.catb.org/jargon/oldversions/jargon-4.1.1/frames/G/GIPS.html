<B>GIPS</B> /gips/ or /jips/ n. <P> [analogy with  <A HREF="../M/MIPS.html">MIPS</A>]
   Giga-Instructions per Second (also possibly `Gillions of
   Instructions per Second'; see  <A HREF="../G/gillion.html">gillion</A>).  In 1991, this is used
   of only a handful of highly parallel machines, but this is expected
   to change.  Compare  <A HREF="../K/KIPS.html">KIPS</A>.  <P>
