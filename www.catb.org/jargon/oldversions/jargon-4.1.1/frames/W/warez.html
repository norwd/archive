<B>warez</B> /weirz/ n. <P> Widely used in  <A HREF="../C/cracker.html">cracker</A> subcultures
   to denote cracked version of commercial software, that is versions
   from which copy-protection has been stripped.  Hackers recognize
   this term but don't use it themselves.  See  <A HREF="../W/warez-d00dz.html">warez d00dz</A>.  <P>
