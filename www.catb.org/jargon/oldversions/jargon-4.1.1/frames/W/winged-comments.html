<P>
<B>winged comments</B> n. <P> Comments set on the same line as code,
   as opposed to  <A HREF="../B/boxed-comments.html">boxed comments</A>.  In C, for example:
<P>
<PRE>
d = sqrt(x*x + y*y);  /* distance from origin */
</PRE>
<P>
   Generally these refer only to the action(s) taken on that line.  <P>
