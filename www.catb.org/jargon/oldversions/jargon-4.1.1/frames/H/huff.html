<B>huff</B> v. <P> To compress data using a Huffman code.  Various
   programs that use such methods have been called `HUFF' or some
   variant thereof.  Oppose  <A HREF="../P/puff.html">puff</A>.  Compare  <A HREF="../C/crunch.html">crunch</A>,
    <A HREF="../C/compress.html">compress</A>.  <P>
