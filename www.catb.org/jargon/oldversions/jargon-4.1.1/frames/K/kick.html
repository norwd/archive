<B>kick</B> v. <P> [IRC] To cause somebody to be removed from a
    <A HREF="../I/IRC.html">IRC</A> channel, an option only available to channel ops.  This is
   an extreme measure, often used to combat extreme  <A HREF="../F/flamage.html">flamage</A> or
    <A HREF="../F/flood.html">flood</A>ing, but sometimes used at the chop's whim.  Compare
    <A HREF="../G/gun.html">gun</A>.
