<B>UBD</B> /U-B-D/ n. <P> [abbreviation for `User Brain Damage']
   An abbreviation used to close out trouble reports obviously due to
   utter cluelessness on the user's part.  Compare  <A HREF="../P/pilot-error.html">pilot error</A>;
   oppose  <A HREF="../P/PBD.html">PBD</A>; see also  <A HREF="../B/brain-damaged.html">brain-damaged</A>.  <P>
