<B>UBE</B> // n. <P> [abbrev., Unsolicilted Bulk Email] A
   widespread, more formal term for email  <A HREF="../S/spam.html">spam</A>. Compare
    <A HREF="../U/UCE.html">UCE</A>. The UBE term recognizes that spam is uttered by nonprofit
   and advocacy groups whose motives are not commercial. <P>
