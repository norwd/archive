<B>EOL</B> /E-O-L/ n. <P> [End Of Line] Syn. for  <A HREF="../N/newline.html">newline</A>,
   derived perhaps from the original CDC6600 Pascal.  Now rare, but
   widely recognized and occasionally used for brevity.  Used in the
   example entry under  <A HREF="../B/BNF.html">BNF</A>.  See also  <A HREF="../E/EOF.html">EOF</A>.  <P>
