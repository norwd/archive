<B>spungle</B> n. <P> [Durham, UK; portmanteau,  <A HREF="../S/spangle.html">spangle</A> +
   bungle] A  <A HREF="../S/spangle.html">spangle</A> of no actual usefulness. Example: Roger the
   Bent Paperclip in Microsoft Word '98.  A spungle's only virtue is
   that it looks pretty, unless you find creeping featurism ugly. <P>
