<B>snarf down</B> v. <P> To  <A HREF="../S/snarf.html">snarf</A>, with the connotation of
   absorbing, processing, or understanding.  "I'll snarf down the
   latest version of the  <A HREF="../N/nethack.html">nethack</A> user's guide -- it's been a
   while since I played last and I don't know what's changed
   recently."
