<B>stomp on</B> vt. <P> To inadvertently overwrite something
   important, usually automatically.  "All the work I did this
   weekend got stomped on last night by the nightly server script."
   Compare  <A HREF="../S/scribble.html">scribble</A>,  <A HREF="../M/mangle.html">mangle</A>,  <A HREF="../T/trash.html">trash</A>,  <A HREF="../S/scrog.html">scrog</A>,
