<P>
<B>scag</B> vt. <P> To destroy the data on a disk, either by
   corrupting the
  filesystem or by causing media damage.  "That last power hit scagged
  the system disk."  Compare  <A HREF="../S/scrog.html">scrog</A>,  <A HREF="../R/roach.html">roach</A>.  <P>
