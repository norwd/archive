<B>stiffy</B> n. <P> [University of Lowell, Massachusetts.] 3.5-inch
    <A HREF="../M/microfloppies.html">microfloppies</A>, so called because their jackets are more rigid
   than those of the 5.25-inch and the (now totally obsolete) 8-inch
   floppy.  Elsewhere this might be called a `firmy'.  <P>
