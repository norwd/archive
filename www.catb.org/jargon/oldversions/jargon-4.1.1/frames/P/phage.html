<P>
<B>phage</B> n. <P> A program that modifies other programs or
   databases in unauthorized ways; esp. one that propagates a
    <A HREF="../V/virus.html">virus</A> or  <A HREF="../T/trojan-horse.html">Trojan horse</A>.  See also  <A HREF="../W/worm.html">worm</A>,
    <A HREF="../M/mockingbird.html">mockingbird</A>.  The analogy, of course, is with phage viruses in
   biology.  <P>
