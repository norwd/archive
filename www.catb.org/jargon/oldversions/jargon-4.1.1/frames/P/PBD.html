<B>PBD</B> /P-B-D/ n. <P> [abbrev. of `Programmer Brain Damage']
   Applied to bug reports revealing places where the program was
   obviously broken by an incompetent or short-sighted programmer.
   Compare  <A HREF="../U/UBD.html">UBD</A>; see also  <A HREF="../B/brain-damaged.html">brain-damaged</A>.  <P>
