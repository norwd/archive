<P>
<B>page out</B> vi. <P> [MIT] 1. To become unaware of one's
   surroundings temporarily, due to daydreaming or preoccupation.
   "Can you repeat that?  I paged out for a minute."  See  <A HREF="../P/page-in.html">page in</A>.  Compare  <A HREF="../G/glitch.html">glitch</A>,  <A HREF="../T/thinko.html">thinko</A>.  2. Syn. `swap out'; see
    <A HREF="../S/swap.html">swap</A>.  <P>
