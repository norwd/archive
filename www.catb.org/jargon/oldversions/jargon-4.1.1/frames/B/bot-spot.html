<B>bot spot</B> n. <P> [MUD, IRC] The user on a MUD with the
   longest connect time.  Derives from the fact that  <A HREF="../B/bot.html">bot</A>s on MUDS
   often stay constantly connected and appear at the bottom of the
   list. <P>
