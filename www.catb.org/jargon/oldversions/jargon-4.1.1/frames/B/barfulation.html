<B>barfulation</B> /bar`fyoo-lay'sh*n/ interj. <P> Variation of
    <A HREF="../B/barf.html">barf</A> used around the Stanford area.  An exclamation,
   expressing disgust.  On seeing some particularly bad code one might
   exclaim, "Barfulation!  Who wrote this, Quux?" <P>
