<B>Black Thursday</B> n. <P> February 8th, 1996 -- the day of the
   signing into law of the  <A HREF="../C/CDA.html">CDA</A>, so called by analogy with the
   catastrophic "Black Friday" in 1929 that began the Great
   Depression. <P>
