<B>bar</B> /bar/ n. <P> 1. [very common] The second
    <A HREF="../M/metasyntactic-variable.html">metasyntactic variable</A>, after  <A HREF="../F/foo.html">foo</A> and before  <A HREF="../B/baz.html">baz</A>.
   "Suppose we have two functions: FOO and BAR.  FOO calls
   BAR...." 2. Often appended to  <A HREF="../F/foo.html">foo</A> to produce
