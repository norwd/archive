<B>boxen</B> /bok'sn/ pl.n. <P> [very common; by analogy with
    <A HREF="../V/VAXen.html">VAXen</A>] Fanciful plural of  <A HREF="../B/box.html">box</A> often encountered in the
   phrase `Unix boxen', used to describe commodity  <A HREF="../U/unix.html">Unix</A>
   hardware.  The connotation is that any two Unix boxen are
   interchangeable.  <P>
