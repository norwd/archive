<B>Bohr bug</B> /bohr buhg/ n. <P> [from quantum physics] A repeatable
    <A HREF="../B/bug.html">bug</A>; one that manifests reliably under a possibly unknown but
   well-defined set of conditions.  Antonym of  <A HREF="../H/heisenbug.html">heisenbug</A>; see also
    <A HREF="../M/mandelbug.html">mandelbug</A>,  <A HREF="../S/schroedinbug.html">schroedinbug</A>.  <P>
