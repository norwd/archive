<TITLE>open</TITLE>
<BODY>
<B>open</B> n. <P> Abbreviation for `open (or left) parenthesis' ---
   used when necessary to eliminate oral ambiguity.  To read aloud the
   LISP form (DEFUN FOO (X) (PLUS X 1)) one might say: "Open defun
   foo, open eks close, open, plus eks one, close close." <P>
