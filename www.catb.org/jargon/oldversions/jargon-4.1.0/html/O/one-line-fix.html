<TITLE>one-line fix</TITLE>
<BODY>
<B>one-line fix</B> n. <P> Used (often sarcastically) of a change to a
   program that is thought to be trivial or insignificant right up to
   the moment it crashes the system.  Usually `cured' by another
   one-line fix.  See also  <A HREF="../I/i-didn-t-change-anything.html">I didn't change anything!</A> <P>
