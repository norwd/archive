<TITLE>octal forty</TITLE>
<BODY>
<B>octal forty</B> /ok'tl for'tee/ n. <P> Hackish way of saying
   "I'm drawing a blank."  Octal 40 is the  <A HREF="../A/ASCII.html">ASCII</A> space
   character, 0100000; by an odd coincidence,  <A HREF="../H/hex.html">hex</A> 40 (01000000)
   is the  <A HREF="../E/EBCDIC.html">EBCDIC</A> space character.  See  <A HREF="../W/wall.html">wall</A>.  <P>
