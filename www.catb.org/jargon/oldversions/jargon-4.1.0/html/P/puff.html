<TITLE>puff</TITLE>
<BODY>
<B>puff</B> vt. <P> To decompress data that has been crunched by
   Huffman coding.  At least one widely distributed Huffman decoder
   program was actually <EM>named</EM> `PUFF', but these days it is
   usually packaged with the encoder.  Oppose  <A HREF="../H/huff.html">huff</A>, see
    <A HREF="../I/inflate.html">inflate</A>.  <P>
