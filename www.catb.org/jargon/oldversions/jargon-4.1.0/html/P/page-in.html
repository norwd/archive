<TITLE>page in</TITLE>
<BODY>
<B>page in</B> v. <P> [MIT] 1. To become aware of one's surroundings
   again after having paged out (see  <A HREF="../P/page-out.html">page out</A>).  Usually confined
   to the sarcastic comment: "Eric pages in,  <A HREF="../F/film-at-11.html">film at 11</A>!"
   2. Syn. `swap in'; see  <A HREF="../S/swap.html">swap</A>.  <P>
