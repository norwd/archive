<TITLE>poser</TITLE>
<BODY>
<B>poser</B> n. <P> A  <A HREF="../W/wannabee.html">wannabee</A>; not hacker slang, but used among
   crackers, phreaks and  <A HREF="../W/warez-d00dz.html">warez d00dz</A>.  Not as negative as
    <A HREF="../L/lamer.html">lamer</A> or  <A HREF="../L/leech.html">leech</A>.  Probably derives from a similar usage
   among punk-rockers and metalheads, putting down those who "talk
   the talk but don't walk the walk". <P>
