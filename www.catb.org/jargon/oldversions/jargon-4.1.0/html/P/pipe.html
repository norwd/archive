<TITLE>pipe</TITLE>
<BODY>
<B>pipe</B> n. <P>  Idiomatically, one's connection to the
   Internet; in context, the expansion "bit pipe" is understood. 
   A "fat pipe" is a line with T1 or higher capacity.  A person with
   a 28.8 modem might be heard to complain "I need a bigger pipe". <P>
