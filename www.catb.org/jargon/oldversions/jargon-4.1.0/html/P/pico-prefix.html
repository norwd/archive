<TITLE>pico-</TITLE>
<BODY>
<B>pico-</B> pref. <P> [SI: a quantifier
   Smaller than  <A HREF="../N/nano-prefix.html">nano-</A>; used in the same rather loose
   connotative way as  <A HREF="../N/nano-prefix.html">nano-</A> and  <A HREF="../M/micro-prefix.html">micro-</A>.  This usage is not yet
   common in the way  <A HREF="../N/nano-prefix.html">nano-</A> and  <A HREF="../M/micro-prefix.html">micro-</A> are, but should be
   instantly recognizable to any hacker.  See also  <A HREF="../Q/quantifiers.html">quantifiers</A>,
    <A HREF="../M/micro-prefix.html">micro-</A>.  <P>
