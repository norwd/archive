<B>pseudosuit</B> /soo'doh-s[y]oot`/ n. <P> A  <A HREF="../S/suit.html">suit</A> wannabee; a
   hacker who has decided that he wants to be in management or
   administration and begins wearing ties, sport coats, and (shudder!)
   suits voluntarily.  It's his funeral.  See also  <A HREF="../L/lobotomy.html">lobotomy</A>.  <P>
