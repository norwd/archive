<TITLE>loose bytes</TITLE>
<BODY>
<B>loose bytes</B> n. <P> Commonwealth hackish term for the padding
   bytes or  <A HREF="../S/shim.html">shim</A>s many compilers insert between members of a
   record or structure to cope with alignment requirements imposed by
   the machine architecture.  <P>
