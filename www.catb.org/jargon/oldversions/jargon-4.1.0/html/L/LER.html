<B>LER</B> /L-E-R/ <P> n. [TMRC, from `Light-Emitting Diode'] A
   light-emitting resistor (that is, one in the process of burning
   up).  Ohm's law was broken.  See also  <A HREF="../S/SED.html">SED</A>.  <P>
