<B>wheel wars</B> n. <P> [Stanford University] A period in  <A HREF="../L/larval-stage.html">larval stage</A> during which student hackers hassle each other by attempting
   to log each other out of the system, delete each other's files, and
   otherwise wreak havoc, usually at the expense of the lesser users.  <P>
