<TITLE>wall wart</TITLE>
<BODY>
<B>wall wart</B> n. <P> A small power-supply brick with integral
   male plug, designed to plug directly into a wall outlet.  These are
   frequently associated with modems and other small electronic
   devices which would become unacceptably bulk or hot if they had
   power supplies on board. <P>
