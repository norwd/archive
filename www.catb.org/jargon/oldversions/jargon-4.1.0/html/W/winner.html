<TITLE>winner</TITLE>
<BODY>
<B>winner</B> <P> 1. n. An unexpectedly good situation, program,
   programmer, or person.  2. `real winner': Often sarcastic, but
   also used as high praise (see also the note under  <A HREF="../U/user.html">user</A>).
   "He's a real winner -- never reports a bug till he can duplicate
   it and send in an example."  <P>
