<B>wugga wugga</B> /wuh'g* wuh'g*/ n. <P> Imaginary sound that a
   computer program makes as it labors with a tedious or difficult
   task.  Compare  <A HREF="../C/cruncha-cruncha-cruncha.html">cruncha cruncha cruncha</A>,  <A HREF="../G/grind.html">grind</A> (sense 4).  <P>
