<TITLE>walk off the end of</TITLE>
<BODY>
<B>walk off the end of</B> vt. <P> To run past the end of an array,
   list, or medium after stepping through it -- a good way to land in
   trouble.  Often the result of an  <A HREF="../O/off-by-one-error.html">off-by-one error</A>.  Compare
    <A HREF="../C/clobber.html">clobber</A>,  <A HREF="../R/roach.html">roach</A>,  <A HREF="../S/smash-the-stack.html">smash the stack</A>.
