<B>weeble</B> /weeb'l/ interj. <P> [Cambridge] Used to denote
   frustration, usually at amazing stupidity.  "I stuck the disk in
   upside down."  "Weeble...." Compare  <A HREF="../G/gurfle.html">gurfle</A>.  <P>
