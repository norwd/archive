<B>asbestos</B> adj. <P> Used as a modifier to anything intended to
   protect one from  <A HREF="../F/flame.html">flame</A>s; also in other highly
    <A HREF="../F/flame.html">flame</A>-suggestive usages.  See, for example,  <A HREF="../A/asbestos-longjohns.html">asbestos longjohns</A> and  <A HREF="../A/asbestos-cork-award.html">asbestos cork award</A>.  <P>
