<B>AIDS</B> /aydz/ n. <P> Short for A* Infected Disk Syndrome (`A*'
   is a  <A HREF="../G/glob.html">glob</A> pattern that matches, but is not limited to, Apple
   or Amiga), this condition is quite often the result of practicing
   unsafe  <A HREF="../S/SEX.html">SEX</A>.  See  <A HREF="../V/virus.html">virus</A>,  <A HREF="../W/worm.html">worm</A>,  <A HREF="../T/trojan-horse.html">Trojan horse</A>,
    <A HREF="../V/virgin.html">virgin</A>.  <P>
