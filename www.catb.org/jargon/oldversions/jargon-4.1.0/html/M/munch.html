<TITLE>munch</TITLE>
<BODY>
<B>munch</B> vt. <P> [often confused with  <A HREF="../M/mung.html">mung</A>, q.v.] To
   transform information in a serial fashion, often requiring large
   amounts of computation.  To trace down a data structure.  Related
   to  <A HREF="../C/crunch.html">crunch</A> and nearly synonymous with  <A HREF="../G/grovel.html">grovel</A>, but connotes
   less pain.  <P>
