<TITLE>mickey mouse program</TITLE>
<BODY>
<B>mickey mouse program</B> n. <P> North American equivalent of a
    <A HREF="../N/noddy.html">noddy</A> (that is, trivial) program.  Doesn't necessarily have
   the belittling connotations of mainstream slang "Oh, that's just
   mickey mouse stuff!"; sometimes trivial programs can be very
   useful.  <P>
