<B>macrotape</B> /mak'roh-tayp/ n. <P> An industry-standard reel of
   tape.  Originally, as opposed to a DEC microtape; nowadays, as
   opposed to modern QIC and DDS tapes.  Syn.  <A HREF="../R/round-tape.html">round tape</A>.  <P>
