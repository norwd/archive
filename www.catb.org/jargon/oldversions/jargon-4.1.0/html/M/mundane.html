<TITLE>mundane</TITLE>
<BODY>
<B>mundane</B> n. <P> [from SF fandom] 1. A person who is not in
   science fiction fandom.  2. A person who is not in the computer
   industry.  In this sense, most often an adjectival modifier as in
   "in my mundane life...." See also  <A HREF="../R/real-world.html">Real World</A>.  <P>
