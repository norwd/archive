<TITLE>minifloppies</TITLE>
<BODY>
<B>minifloppies</B> n. <P> 5.25-inch  <A HREF="../V/vanilla.html">vanilla</A> floppy disks, as
   opposed to 3.5-inch or  <A HREF="../M/microfloppies.html">microfloppies</A> and the now-obsolescent
   8-inch variety.  At one time, this term was a trademark of Shugart
   Associates for their SA-400 minifloppy drive.  Nobody paid any
   attention.  See  <A HREF="../S/stiffy.html">stiffy</A>.  <P>
