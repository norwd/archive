<B>monstrosity</B> <P> 1. n. A ridiculously  <A HREF="../E/elephantine.html">elephantine</A> program
   or system, esp. one that is buggy or only marginally functional.
   2. adj. The quality of being monstrous (see `Overgeneralization' in
   the discussion of jargonification).  See also  <A HREF="../B/baroque.html">baroque</A>.  <P>
