<TITLE>hardwarily</TITLE>
<BODY>
<B>hardwarily</B> /hard-weir'*-lee/ adv. <P> In a way pertaining to
   hardware.  "The system is hardwarily unreliable."  The adjective
   `hardwary' is <EM>not</EM> traditionally used, though it has
   recently been reported from the U.K.  See  <A HREF="../S/softwarily.html">softwarily</A>.  <P>
