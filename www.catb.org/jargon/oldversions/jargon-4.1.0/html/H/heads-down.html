<TITLE>heads down</TITLE>
<BODY>
<B>heads down</B> [Sun] adj. <P> Concentrating, usually so heavily and
   for so long that everything outside the focus area is missed.  See
   also  <A HREF="../H/hack-mode.html">hack mode</A> and  <A HREF="../L/larval-stage.html">larval stage</A>, although this mode is
   hardly confined to fledgling hackers.  <P>
