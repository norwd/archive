<B>include war</B> n. <P> Excessive multi-leveled inclusion within a
   discussion  <A HREF="../T/thread.html">thread</A>, a practice that tends to annoy readers.  In
   a forum with high-traffic newsgroups, such as Usenet, this can lead
   to  <A HREF="../F/flame.html">flame</A>s and the urge to start a  <A HREF="../K/kill-file.html">kill file</A>.  <P>
