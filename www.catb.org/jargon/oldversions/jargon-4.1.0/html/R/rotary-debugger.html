<B>rotary debugger</B> n. <P> [Commodore] Essential equipment for
   those late-night or early-morning debugging sessions.  Mainly used
   as sustenance for the hacker.  Comes in many decorator colors, such
   as Sausage, Pepperoni, and Garbage.  See  <A HREF="../A/ansi-standard-pizza.html">ANSI standard pizza</A>.  <P>
