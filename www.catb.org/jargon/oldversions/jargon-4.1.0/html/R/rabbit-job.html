<TITLE>rabbit job</TITLE>
<BODY>
<B>rabbit job</B> n. <P> [Cambridge] A batch job that does little, if
   any, real work, but creates one or more copies of itself, breeding
   like rabbits.  Compare  <A HREF="../W/wabbit.html">wabbit</A>,  <A HREF="../F/fork-bomb.html">fork bomb</A>.  <P>
