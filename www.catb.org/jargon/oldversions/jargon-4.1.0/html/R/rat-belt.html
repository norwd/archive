<TITLE>rat belt</TITLE>
<BODY>
<B>rat belt</B> n. <P> A cable tie, esp. the sawtoothed,
   self-locking plastic kind that you can remove only by cutting (as
   opposed to a random twist of wire or a twist tie or one of those
   humongous metal clip frobs).  Small cable ties are `mouse belts'.  <P>
