<B>read-only user</B> n. <P> Describes a  <A HREF="../L/luser.html">luser</A> who uses computers
   almost exclusively for reading Usenet, bulletin boards, and/or
   email, rather than writing code or purveying useful information.
   See  <A HREF="../T/twink.html">twink</A>,  <A HREF="../T/terminal-junkie.html">terminal junkie</A>,  <A HREF="../L/lurker.html">lurker</A>.  <P>
