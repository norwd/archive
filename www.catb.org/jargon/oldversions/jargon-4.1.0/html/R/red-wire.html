<B>red wire</B> n. <P> [IBM] Patch wires installed by programmers who have
   no business mucking with the hardware.  It is said that the only
   thing more dangerous than a hardware guy with a code patch is a
    <A HREF="../S/softy.html">softy</A> with a soldering iron....  Compare  <A HREF="../B/blue-wire.html">blue wire</A>,
    <A HREF="../Y/yellow-wire.html">yellow wire</A>,  <A HREF="../P/purple-wire.html">purple wire</A>.  <P>
