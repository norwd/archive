<TITLE>KISS Principle</TITLE>
<BODY>
<B>KISS Principle</B> /kis' prin'si-pl/ n. <P> "Keep It Simple,
   Stupid".  A maxim often invoked when discussing design to fend off
    <A HREF="../C/creeping-featurism.html">creeping featurism</A> and control development complexity.
   Possibly related to the  <A HREF="../M/marketroid.html">marketroid</A> maxim on sales
   presentations, "Keep It Short and Simple".  <P>
