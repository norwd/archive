<TITLE>buglix</TITLE>
<BODY>
<B>buglix</B> /buhg'liks/ n. <P> Pejorative term referring to
    <A HREF="../D/DEC.html">DEC</A>'s ULTRIX operating system in its earlier <EM>severely</EM>
   buggy versions.  Still used to describe ULTRIX, but without nearly
   so much venom.  Compare  <A HREF="../A/AIDX.html">AIDX</A>,  <A HREF="../H/hp-sux.html">HP-SUX</A>,  <A HREF="../N/nominal-semidestructor.html">Nominal Semidestructor</A>,  <A HREF="../T/telerat.html">Telerat</A>,  <A HREF="../S/sun-stools.html">sun-stools</A>.  <P>
