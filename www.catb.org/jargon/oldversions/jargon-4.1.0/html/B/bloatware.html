<TITLE>bloatware</TITLE>
<BODY>
<B>bloatware</B> n. <P> Software that provides minimal
   functionality while requiring a disproportionate amount of
   diskspace and memory.  Especially used application and OS upgrades.
   This term is very common in the Windows/NT world.  So is its
   cause. <P>
