<B>banana label</B> n. <P> The labels often used on the sides of
    <A HREF="../M/macrotape.html">macrotape</A> reels, so called because they are shaped roughly
   like blunt-ended bananas.  This term, like macrotapes themselves,
   is still current but visibly headed for obsolescence.  <P>
