<B>BUAG</B> // n. <P> [abbreviation, from <I><a href="news:alt.fan.warlord">alt.fan.warlord</a></I>] Big
   Ugly ASCII Graphic.  Pejorative term for ugly  <A HREF="../A/ascii-art.html">ASCII art</A>,
   especially as found in  <A HREF="../S/sig-block.html">sig block</A>s.  For some reason, mutations
   of the head of Bart Simpson are particularly common in the least
   imaginative  <A HREF="../S/sig-block.html">sig block</A>s.  See  <A HREF="../W/warlording.html">warlording</A>.  <P>
