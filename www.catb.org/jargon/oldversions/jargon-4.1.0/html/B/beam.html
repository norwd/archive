<B>beam</B> vt. <P> [from Star Trek Classic's "Beam me up, Scotty!"]
   To transfer  <A HREF="../S/softcopy.html">softcopy</A> of a file electronically; most often
   in combining forms such as `beam me a copy' or `beam that over
   to his site'.  Compare  <A HREF="../B/blast.html">blast</A>,  <A HREF="../S/snarf.html">snarf</A>,  <A HREF="../B/BLT.html">BLT</A>.  <P>
