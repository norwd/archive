<TITLE>bang on</TITLE>
<BODY>
<B>bang on</B> vt. <P> To stress-test a piece of hardware or software:
   "I banged on the new version of the simulator all day yesterday
   and it didn't crash once.  I guess it is ready for release."  The
   term  <A HREF="../P/pound-on.html">pound on</A> is synonymous.  <P>
