<TITLE>bogue out</TITLE>
<BODY>
<B>bogue out</B> /bohg owt/ vi. <P> To become bogus, suddenly and
   unexpectedly.  "His talk was relatively sane until somebody asked
   him a trick question; then he bogued out and did nothing but
    <A HREF="../F/flame.html">flame</A> afterwards."  See also  <A HREF="../B/bogosity.html">bogosity</A>,  <A HREF="../B/bogus.html">bogus</A>.  <P>
