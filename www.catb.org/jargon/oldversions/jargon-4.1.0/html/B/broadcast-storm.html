<TITLE>broadcast storm</TITLE>
<BODY>
<B>broadcast storm</B> n. <P> An incorrect packet broadcast on a
   network that causes most hosts to respond all at once, typically
   with wrong answers that start the process over again.  See
    <A HREF="../N/network-meltdown.html">network meltdown</A>; compare  <A HREF="../M/mail-storm.html">mail storm</A>.  <P>
