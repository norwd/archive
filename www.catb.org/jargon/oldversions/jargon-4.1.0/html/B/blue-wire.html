<TITLE>blue wire</TITLE>
<BODY>
<B>blue wire</B> n. <P> [IBM] Patch wires added to circuit boards at
   the factory to correct design or fabrication problems.  These may
   be necessary if there hasn't been time to design and qualify
   another board version.  Compare  <A HREF="../P/purple-wire.html">purple wire</A>,  <A HREF="../R/red-wire.html">red wire</A>,
    <A HREF="../Y/yellow-wire.html">yellow wire</A>,  <A HREF="../P/pink-wire.html">pink wire</A>.  <P>
