<BODY>
<B>blow up</B> vi. <P> 1. [scientific computation] To become unstable.
   Suggests that the computation is diverging so rapidly that it will
   soon overflow or at least go  <A HREF="../N/nonlinear.html">nonlinear</A>.  2.  Syn.  <A HREF="../B/blow-out.html">blow out</A>.  <P>
