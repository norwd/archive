<TITLE>bytesexual</TITLE>
<BODY>
<B>bytesexual</B> /bi:t`sek'shu-*l/ adj. <P> [rare] Said of
   hardware, denotes willingness to compute or pass data in either
    <A HREF="../B/big-endian.html">big-endian</A> or  <A HREF="../L/little-endian.html">little-endian</A> format (depending,
   presumably, on a  <A HREF="../M/mode-bit.html">mode bit</A> somewhere).  See also  <A HREF="../N/nuxi-problem.html">NUXI problem</A>. <P>
