<TITLE>bogon flux</TITLE>
<BODY>
<B>bogon flux</B> /boh'gon fluhks/ n. <P> A measure of a supposed
   field of  <A HREF="../B/bogosity.html">bogosity</A> emitted by a speaker, measured by a
    <A HREF="../B/bogometer.html">bogometer</A>; as a speaker starts to wander into increasing
   bogosity a listener might say "Warning, warning, bogon flux is
   rising".  See  <A HREF="../Q/quantum-bogodynamics.html">quantum bogodynamics</A>.
