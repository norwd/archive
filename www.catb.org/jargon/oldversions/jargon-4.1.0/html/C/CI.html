<TITLE>CI$</TITLE>
<BODY>
<B>CI$</B> // n. <P> Hackerism for `CIS', CompuServe Information
   Service.  The dollar sign refers to CompuServe's rather steep line
   charges.  Often used in  <A HREF="../S/sig-block.html">sig block</A>s just before a CompuServe
   address.  Syn.  <A HREF="../C/compu-erve.html">Compu$erve</A>.  <P>
