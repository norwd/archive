<TITLE>channel hopping</TITLE>
<BODY>
<B>channel hopping</B> n. <P> [IRC, GEnie] To rapidly switch channels
   on  <A HREF="../I/IRC.html">IRC</A>, or a GEnie chat board, just as a social butterfly
   might hop from one group to another at a party.  This term may
   derive from the TV watcher's idiom, `channel surfing'.  <P>
