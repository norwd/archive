<TITLE>creep</TITLE>
<BODY>
<B>creep</B> v. <P> To advance, grow, or multiply inexorably.  In
   hackish usage this verb has overtones of menace and silliness,
   evoking the creeping horrors of low-budget monster movies.  <P>
