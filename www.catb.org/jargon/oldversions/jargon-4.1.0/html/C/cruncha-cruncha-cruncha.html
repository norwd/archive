<B>cruncha cruncha cruncha</B> /kruhn'ch* kruhn'ch* kruhn'ch*/ interj. <P>
   An encouragement sometimes muttered to a machine
   bogged down in a serious  <A HREF="../G/grovel.html">grovel</A>.  Also describes a notional
   sound made by groveling hardware.  See  <A HREF="../W/wugga-wugga.html">wugga wugga</A>,  <A HREF="../G/grind.html">grind</A>
   (sense 3).  <P>
