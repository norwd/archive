<TITLE>cycle server</TITLE>
<BODY>
<B>cycle server</B> n. <P> A powerful machine that exists primarily
   for running large compute-, disk-, or memory-intensive jobs.
   Implies that interactive tasks such as editing are done on other
   machines on the network, such as workstations.  <P>
