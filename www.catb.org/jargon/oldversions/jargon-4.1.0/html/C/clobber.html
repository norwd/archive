<B>clobber</B> vt. <P> To overwrite, usually unintentionally: "I
   walked off the end of the array and clobbered the stack."  Compare
    <A HREF="../M/mung.html">mung</A>,  <A HREF="../S/scribble.html">scribble</A>,  <A HREF="../T/trash.html">trash</A>, and  <A HREF="../S/smash-the-stack.html">smash the stack</A>.  <P>
