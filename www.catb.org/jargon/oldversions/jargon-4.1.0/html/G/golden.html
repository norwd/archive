<TITLE>golden</TITLE>
<BODY>
<B>golden</B> adj. <P> [prob. from folklore's `golden egg'] When
   used to describe a magnetic medium (e.g., `golden disk',
   `golden tape'), describes one containing a tested, up-to-spec,
   ready-to-ship software version.  Compare  <A HREF="../P/platinum-iridium.html">platinum-iridium</A>.  <P>
