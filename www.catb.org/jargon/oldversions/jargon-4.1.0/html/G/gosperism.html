<B>Gosperism</B> /gos'p*r-izm/ n. <P> A hack, invention, or saying
   due to arch-hacker R. William (Bill) Gosper.  This notion merits
   its own term because there are so many of them.  Many of the
   entries in  <A HREF="../H/HAKMEM.html">HAKMEM</A> are Gosperisms; see also  <A HREF="../L/life.html">life</A>.  <P>
