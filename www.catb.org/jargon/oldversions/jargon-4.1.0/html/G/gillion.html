<TITLE>gillion</TITLE>
<BODY>
<B>gillion</B> /gil'y*n/ or /jil'y*n/ n. <P> [formed from
    <A HREF="../G/giga-prefix.html">giga-</A> by analogy with mega/million and tera/trillion]
   10^9. Same as an American billion or a British `milliard'.
   How one pronounces this depends on whether one speaks  <A HREF="../G/giga-prefix.html">giga-</A>
   with a hard or soft `g'.  <P>
