<TITLE>gobble</TITLE>
<BODY>
<B>gobble</B> vt. <P> 1. To consume, usu. used with `up'.  "The
   output spy gobbles characters out of a  <A HREF="../T/tty.html">tty</A> output buffer."
   2. To obtain, usu. used with `down'.  "I guess I'll gobble down
   a copy of the documentation tomorrow."  See also  <A HREF="../S/snarf.html">snarf</A>.  <P>
