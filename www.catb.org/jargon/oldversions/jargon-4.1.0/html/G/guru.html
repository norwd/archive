<B>guru</B> n. <P> [Unix] An expert.  Implies not only  <A HREF="../W/wizard.html">wizard</A>
   skill but also a history of being a knowledge resource for others.
   Less often, used (with a qualifier) for other experts on other
   systems, as in `VMS guru'.  See  <A HREF="../S/source-of-all-good-bits.html">source of all good bits</A>.
