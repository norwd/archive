<TITLE>grunge</TITLE>
<BODY>
<B>grunge</B> /gruhnj/ n. <P> 1. That which is grungy, or that which
   makes it so.  2. [Cambridge] Code which is inaccessible due to
   changes in other parts of the program.  The preferred term in North
   America is  <A HREF="../D/dead-code.html">dead code</A>.  <P>
