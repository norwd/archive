<B>netiquette</B> /net'ee-ket/ or /net'i-ket/ n. <P> [portmanteau
   from "network etiquette"] The conventions of politeness
   recognized on  <A HREF="../U/usenet.html">Usenet</A>, such as avoidance of cross-posting to
   inappropriate groups and refraining from commercial pluggery
   outside the <I>biz</I> groups.  <P>
