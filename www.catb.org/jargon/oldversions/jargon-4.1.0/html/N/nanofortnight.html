<B>nanofortnight</B> n. <P> [Adelaide University] 1 fortnight
   * 10^(-9), or about 1.2 msec.  This unit was used
   largely by students doing undergraduate practicals.  See
    <A HREF="../M/microfortnight.html">microfortnight</A>,  <A HREF="../A/attoparsec.html">attoparsec</A>, and  <A HREF="../M/micro-prefix.html">micro-</A>.  <P>
