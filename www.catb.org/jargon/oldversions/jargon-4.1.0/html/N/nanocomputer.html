<TITLE>nanocomputer</TITLE>
<BODY>
<B>nanocomputer</B> /nan'oh-k*m-pyoo'tr/ n. <P> A computer with
   molecular-sized switching elements.  Designs for mechanical
   nanocomputers which use single-molecule sliding rods for their
   logic have been proposed.  The controller for a  <A HREF="../N/nanobot.html">nanobot</A> would
   be a nanocomputer.  <P>
