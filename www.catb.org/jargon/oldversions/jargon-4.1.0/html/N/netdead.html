<TITLE>netdead</TITLE>
<BODY>
<B>netdead</B> n. <P> [IRC] The state of someone who signs off
    <A HREF="../I/IRC.html">IRC</A>, perhaps during a  <A HREF="../N/netburp.html">netburp</A>, and doesn't sign back on
   until later.  In the interim, he is "dead to the net".  
   Compare  <A HREF="../L/link-dead.html">link-dead</A>. <P>
