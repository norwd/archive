<B>neat hack</B> n. <P> 1. A clever technique.  2. A brilliant
   practical joke, where neatness is correlated with cleverness,
   harmlessness, and surprise value.  Example: the Caltech Rose Bowl
   card display switch (see " <A HREF="../sections/the-meaning-of-hack.html" TARGET="_parent">The Meaning of `Hack'</A>",
   Appendix A).  See also  <A HREF="../H/hack.html">hack</A>.  <P>
