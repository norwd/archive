<TITLE>VAXectomy</TITLE>
<BODY>
<B>VAXectomy</B> /vak-sek't*-mee/ n. <P> [by analogy with
   `vasectomy'] A VAX removal.   <A HREF="../D/DEC.html">DEC</A>'s Microvaxen, especially, are
   much slower than newer RISC-based workstations such as the SPARC.
   Thus, if one knows one has a replacement coming, VAX removal can be
   cause for celebration.  <P>
