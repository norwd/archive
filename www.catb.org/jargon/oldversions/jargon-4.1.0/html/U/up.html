<TITLE>up</TITLE>
<BODY>
<B>up</B> adj. <P> 1. Working, in order.  "The down escalator is
   up."  Oppose  <A HREF="../D/down.html">down</A>.  2. `bring up': vt. To create a working
   version and start it.  "They brought up a down system."
   3. `come up' vi. To become ready for production use.  <P>
