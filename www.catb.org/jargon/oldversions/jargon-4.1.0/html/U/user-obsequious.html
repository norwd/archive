<B>user-obsequious</B> adj. <P> Emphatic form of  <A HREF="../U/user-friendly.html">user-friendly</A>.
   Connotes a system so verbose, inflexible, and determinedly
   simple-minded that it is nearly unusable.  "Design a system any
   fool can use and only a fool will want to use it."  See  <A HREF="../W/wimp-environment.html">WIMP environment</A>,  <A HREF="../M/macintrash.html">Macintrash</A>.  <P>
