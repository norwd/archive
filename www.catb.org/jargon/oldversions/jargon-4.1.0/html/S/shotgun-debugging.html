<TITLE>shotgun debugging</TITLE>
<BODY>
<B>shotgun debugging</B> n. <P> The software equivalent of  <A HREF="../E/easter-egging.html">Easter egging</A>; the making of relatively undirected changes to software in
   the hope that a bug will be perturbed out of existence.  This
   almost never works, and usually introduces more bugs.  <P>
