<B>silly walk</B> vi. <P> [from Monty Python's Flying Circus] 1. A
   ridiculous procedure required to accomplish a task.  Like
    <A HREF="../G/grovel.html">grovel</A>, but more  <A HREF="../R/random.html">random</A> and humorous.  "I had to
   silly-walk through half the /usr directories to find the maps
   file."  2. Syn.  <A HREF="../F/fandango-on-core.html">fandango on core</A>.  <P>
