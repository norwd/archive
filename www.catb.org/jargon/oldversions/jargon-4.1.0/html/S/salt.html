<TITLE>salt</TITLE>
<BODY>
<B>salt</B> n. <P> A tiny bit of near-random data inserted where too
   much regularity would be undesirable; a data  <A HREF="../F/frob.html">frob</A> (sense 1).
   For example, the Unix crypt(3) man page mentions that "the salt
   string is used to perturb the DES algorithm in one of 4096
   different ways." <P>
