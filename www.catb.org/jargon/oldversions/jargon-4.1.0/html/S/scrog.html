<TITLE>scrog</TITLE>
<BODY>
<B>scrog</B> /skrog/ vt. <P> [Bell Labs] To damage, trash, or
   corrupt a data structure.  "The list header got scrogged."  Also
   reported as `skrog', and ascribed to the comic strip "The
   Wizard of Id".  Compare  <A HREF="../S/scag.html">scag</A>; possibly the two are related.
   Equivalent to  <A HREF="../S/scribble.html">scribble</A> or  <A HREF="../M/mangle.html">mangle</A>.  <P>
