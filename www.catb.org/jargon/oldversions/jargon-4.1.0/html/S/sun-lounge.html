<TITLE>sun lounge</TITLE>
<BODY>
<B>sun lounge</B> n. <P> [UK] The room where all the Sun workstations live.
   The humor in this term comes from the fact that it's also in
   mainstream use to describe a solarium, and all those Sun
   workstations clustered together give off an amazing amount of heat.  <P>
