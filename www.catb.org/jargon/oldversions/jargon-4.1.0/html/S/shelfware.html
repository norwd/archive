<TITLE>shelfware</TITLE>
<BODY>
<B>shelfware</B> /shelf'weir/ n. <P> Software purchased on a whim (by
   an individual user) or in accordance with policy (by a corporation
   or government agency), but not actually required for any particular
   use.  Therefore, it often ends up on some shelf.  <P>
