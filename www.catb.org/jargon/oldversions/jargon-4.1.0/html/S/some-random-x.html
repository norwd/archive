<TITLE>some random X</TITLE>
<BODY>
<B>some random X</B> adj. <P> Used to indicate a member of class X,
   with the implication that Xs are interchangeable.  "I think some
   random cracker tripped over the guest timeout last night."  See
   also  <A HREF="../J/j-random.html">J. Random</A>.  <P>
