<B>salt mines</B> n. <P> Dense quarters housing large numbers of
   programmers working long hours on grungy projects, with some hope
   of seeing the end of the tunnel in N years.  Noted for their
   absence of sunshine.  Compare  <A HREF="../P/playpen.html">playpen</A>,  <A HREF="../S/sandbox.html">sandbox</A>.  <P>
