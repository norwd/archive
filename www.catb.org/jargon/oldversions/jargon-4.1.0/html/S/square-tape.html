<TITLE>square tape</TITLE>
<BODY>
<B>square tape</B> n. <P> Mainframe magnetic tape cartridges for use
   with IBM 3480 or compatible tape drives; or QIC tapes used on
   workstations and micros.  The term comes from the square (actually
   rectangular) shape of the cartridges; contrast  <A HREF="../R/round-tape.html">round tape</A>.  <P>
