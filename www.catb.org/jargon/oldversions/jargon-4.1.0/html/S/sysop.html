<TITLE>sysop</TITLE>
<BODY>
<B>sysop</B> /sis'op/ n. <P> [esp. in the BBS world] The operator
   (and usually the owner) of a bulletin-board system.  A common
   neophyte mistake on  <A HREF="../F/FidoNet.html">FidoNet</A> is to address a message to
   `sysop' in an international  <A HREF="../E/echo.html">echo</A>, thus sending it to
   hundreds of sysops around the world.  <P>
