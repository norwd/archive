<B>dead</B> adj. <P> 1. Non-functional;  <A HREF="../D/down.html">down</A>;  <A HREF="../C/crash.html">crash</A>ed.
   Especially used of hardware.  2. At XEROX PARC, software that is
   working but not undergoing continued development and support.
   3. Useless; inaccessible.  Antonym: `live'.  Compare  <A HREF="../D/dead-code.html">dead code</A>.  <P>
