<B>ding</B> n.,vi. <P> 1. Synonym for  <A HREF="../F/feep.html">feep</A>.  Usage: rare among
   hackers, but commoner in the  <A HREF="../R/real-world.html">Real World</A>.  2. `dinged': What
   happens when someone in authority gives you a minor bitching about
   something, esp. something trivial.  "I was dinged for having a
   messy desk." <P>
