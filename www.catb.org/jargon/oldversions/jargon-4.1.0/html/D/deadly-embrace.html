<B>deadly embrace</B> n. <P> Same as  <A HREF="../D/deadlock.html">deadlock</A>, though usually
   used only when exactly two processes are involved.  This is the
   more popular term in Europe, while  <A HREF="../D/deadlock.html">deadlock</A> predominates in
   the United States.  <P>
