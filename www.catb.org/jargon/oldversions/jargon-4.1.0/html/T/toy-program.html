<BODY>
<B>toy program</B> n. <P> 1. One that can be readily comprehended;
   hence, a trivial program (compare  <A HREF="../N/noddy.html">noddy</A>).  2. One for which
   the effort of initial coding dominates the costs through its life
   cycle.  See also  <A HREF="../N/noddy.html">noddy</A>.  <P>
