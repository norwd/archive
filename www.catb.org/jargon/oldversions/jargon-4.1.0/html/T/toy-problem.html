<B>toy problem</B> n. <P> [AI] A deliberately oversimplified case of a
   challenging problem used to investigate, prototype, or test
   algorithms for a real problem.  Sometimes used pejoratively.  See
   also  <A HREF="../G/gedanken.html">gedanken</A>,  <A HREF="../T/toy-program.html">toy program</A>.  <P>
