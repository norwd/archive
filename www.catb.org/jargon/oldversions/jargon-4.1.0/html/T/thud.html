<TITLE>thud</TITLE>
<BODY>
<B>thud</B> n. <P> 1. Yet another  <A HREF="../M/metasyntactic-variable.html">metasyntactic variable</A> (see
    <A HREF="../F/foo.html">foo</A>).  It is reported that at CMU from the mid-1970s the
   canonical series of these was `foo', `bar', `thud', `blat'.
   2. Rare term for the hash character, `#' (ASCII 0100011).  See
    <A HREF="../A/ASCII.html">ASCII</A> for other synonyms.  <P>
