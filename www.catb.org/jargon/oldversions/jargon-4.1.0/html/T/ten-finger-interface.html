<TITLE>ten-finger interface</TITLE>
<BODY>
<B>ten-finger interface</B> n. <P> The interface between two networks
   that cannot be directly connected for security reasons; refers to
   the practice of placing two terminals side by side and having an
   operator read from one and type into the other.  <P>
