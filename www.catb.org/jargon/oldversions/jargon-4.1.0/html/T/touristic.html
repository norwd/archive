<TITLE>touristic</TITLE>
<BODY>
<B>touristic</B> adj. <P> Having the quality of a  <A HREF="../T/tourist.html">tourist</A>.  Often
   used as a pejorative, as in `losing touristic scum'.  Often
   spelled `turistic' or `turistik', so that phrase might be more
   properly rendered `lusing turistic scum'.  <P>
