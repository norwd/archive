<B>era</B> n. <P> Syn.  <A HREF="../E/epoch.html">epoch</A>.  Webster's Unabridged makes these
   words almost synonymous, but `era' more often connotes a span of
   time rather than a point in time, whereas the reverse is true for
    <A HREF="../E/epoch.html">epoch</A>.  The  <A HREF="../E/epoch.html">epoch</A> usage is recommended.  <P>
