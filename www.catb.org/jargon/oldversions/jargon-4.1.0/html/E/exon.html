<B>Exon</B> /eks'on/ excl. <P> A generic obscenity that quickly
   entered wide use on the Internet and Usenet after  <A HREF="../B/black-thursday.html">Black Thursday</A>. From the last name of Senator James Exon
   (Democrat-Nebraska), primary author of the  <A HREF="../C/CDA.html">CDA</A>. <P>
