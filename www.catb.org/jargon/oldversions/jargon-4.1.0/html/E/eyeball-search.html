<TITLE>eyeball search</TITLE>
<BODY>
<B>eyeball search</B> n.,v. <P> To look for something in a mass of
   code or data with one's own native optical sensors, as opposed to
   using some sort of pattern matching software like  <A HREF="../G/grep.html">grep</A> or any
   other automated search tool.  Also called a  <A HREF="../V/vgrep.html">vgrep</A>; compare
    <A HREF="../V/vdiff.html">vdiff</A>,  <A HREF="../D/desk-check.html">desk check</A>.  <P>
