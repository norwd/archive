<TITLE>yellow wire</TITLE>
<BODY>
<B>yellow wire</B> n. <P> [IBM] Repair wires used when connectors
   (especially ribbon connectors) got broken due to some schlemiel
   pinching them, or to reconnect cut traces after the FE mistakenly
   cut one.  Compare  <A HREF="../B/blue-wire.html">blue wire</A>,  <A HREF="../P/purple-wire.html">purple wire</A>,  <A HREF="../R/red-wire.html">red wire</A>.  <P>
