<p><b>stomp on</b> vt. <p>
 To inadvertently overwrite something
   important, usually automatically.  "All the work I did this
   weekend got stomped on last night by the nightly server script." 
   Compare <b><a href="scribble.html">scribble</a></b>, <b><a href="mangle.html">mangle</a></b>, <b><a href="trash.html">trash</a></b>, <b><a href="scrog.html">scrog</a></b>,
