<p><b>EOL</b> /E-O-L/ n. <p>
 [End Of Line] Syn. for <b><a href="newline.html">newline</a></b>,
   derived perhaps from the original CDC6600 Pascal.  Now rare, but
   widely recognized and occasionally used for brevity.  Used in the
   example entry under <b><a href="BNF.html">BNF</a></b>.  See also <b><a href="EOF.html">EOF</a></b>.
