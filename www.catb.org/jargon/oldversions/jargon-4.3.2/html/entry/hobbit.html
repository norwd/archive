<p><b>hobbit</b> n. <p>
 1. [rare] The High Order BIT of a byte; same
   as the <b><a href="meta-bit.html">meta bit</a></b> or <b><a href="high-bit.html">high bit</a></b>.  2. The non-ITS name of
   <a href="mailto:vad@ai.mit.edu">vad@ai.mit.edu</a> (*Hobbit*), master of lasers.
