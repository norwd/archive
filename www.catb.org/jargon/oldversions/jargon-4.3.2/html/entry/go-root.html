<p><b>go root</b> vi. <p>
 [Unix; common] To temporarily enter
   <b><a href="root-mode.html">root mode</a></b> in order to perform a privileged operation.  This
   use is deprecated in Australia, where v. `root' is a synonym
   for "fuck".
