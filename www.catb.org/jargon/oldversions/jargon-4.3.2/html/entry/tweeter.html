<p><b>tweeter</b> n. <p>
 [University of Waterloo] Syn. <b><a href="perf.html">perf</a></b>,
   <b><a href="chad.html">chad</a></b> (sense 1).  This term (like <b><a href="woofer.html">woofer</a></b>) has been in use
   at Waterloo since 1972 but is elsewhere unknown.  In audio jargon,
   the word refers to the treble speaker(s) on a hi-fi.
