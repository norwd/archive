<p><b>sysape</b> /sys'ayp/ n. <p>
 A rather derogatory term for a
   computer operator; a play on <b><a href="sysop.html">sysop</a></b> common at sites that use
   the banana hierarchy of problem complexity (see <b><a href="one-banana-problem.html">one-banana problem</a></b>).
