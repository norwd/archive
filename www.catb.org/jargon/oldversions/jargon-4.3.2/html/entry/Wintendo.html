<p><b>Wintendo</b> /win-ten'doh/ n.  <p>
 [Play on "Nintendo"] A
   PC running the Windows operating system kept primarily for the
   purpose of viewing multimedia and playing games.  The implication
   is that the speaker uses a Linux or *BSD box for everything else.
