<p><b>hackish</b> /hak'ish/ adj. <p>
 (also <b><a href="hackishness.html">hackishness</a></b> n.) 1. Said
   of something that is or involves a hack.  2. Of or pertaining to
   hackers or the hacker subculture.  See also <b><a href="true-hacker.html">true-hacker</a></b>.
