<p><b>nick</b> n. <p>
 [IRC; very common] Short for nickname.  On
   <b><a href="IRC.html">IRC</a></b>, every user must pick a nick, which is sometimes the same
   as the user's real name or login name, but is often more fanciful. 
   Compare <b><a href="handle.html">handle</a></b>, <b><a href="screen-name.html">screen name</a></b>.
