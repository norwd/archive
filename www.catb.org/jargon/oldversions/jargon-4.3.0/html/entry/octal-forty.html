<p><b>octal forty</b> /ok'tl for'tee/ n. <p>
 Hackish way of saying
   "I'm drawing a blank."  Octal 40 is the <b><a href="ASCII.html">ASCII</a></b> space
   character, 0100000; by an odd coincidence, <b><a href="hex.html">hex</a></b> 40 (01000000)
   is the <b><a href="EBCDIC.html">EBCDIC</a></b> space character.  See <b><a href="wall.html">wall</a></b>.
