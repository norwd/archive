<p><b>RTBM</b> /R-T-B-M/ imp. <p>
 [Unix] Commonwealth Hackish variant
   of <b><a href="RTFM.html">RTFM</a></b>; expands to `Read The Bloody Manual'.  RTBM is often
   the entire text of the first reply to a question from a
   <b><a href="newbie.html">newbie</a></b>; the <em>second</em> would escalate to "RTFM".
