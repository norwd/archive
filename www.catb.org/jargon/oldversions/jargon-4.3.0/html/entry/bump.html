<p><b>bump</b> vt. <p>
 Synonym for increment.  Has the same meaning as
   C's ++ operator.  Used esp. of counter variables, pointers, and
   index dummies in <code>for</code>, <code>while</code>, and <code>do-while</code>
   loops.
