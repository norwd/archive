<p><b>verbage</b> /ver'b*j/ n. <p>

   mispronunciation of <b><a href="verbiage.html">verbiage</a></b> that assimilates it to the word
   `garbage'.  Compare <b><a href="content-free.html">content-free</a></b>.  More pejorative than
   `verbiage'.
