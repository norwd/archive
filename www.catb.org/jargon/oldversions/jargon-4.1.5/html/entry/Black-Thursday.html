<p><b>Black Thursday</b> n. <p>
 February 8th, 1996 - the day of the
   signing into law of the <b><a href="CDA.html">CDA</a></b>, so called by analogy with the
   catastrophic "Black Friday" in 1929 that began the Great
   Depression.
