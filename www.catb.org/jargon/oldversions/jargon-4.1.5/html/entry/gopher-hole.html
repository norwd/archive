<p><b>gopher hole</b> n. <p>
 1. Any access to a <b><a href="gopher.html">gopher</a></b>.  2. [Amateur
   Packet Radio] The terrestrial analog of a <b><a href="wormhole.html">wormhole</a></b> (sense
   2), from which this term was coined.  A gopher hole links two
   amateur packet relays through some non-ham radio medium.
