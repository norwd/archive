<p><b>dumbass attack</b> /duhm'as *-tak'/ n. <p>
 [Purdue] Notional
   cause of a novice's mistake made by the experienced, especially one
   made while running as <b><a href="root.html">root</a></b> under Unix, e.g., typing <code>rm
   -r *</code> or <code>mkfs</code> on a mounted file system.  Compare <b><a href="adger.html">adger</a></b>.
