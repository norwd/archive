<p><b>macrotape</b> /mak'roh-tayp/ n. <p>
 An industry-standard reel of
   tape.  Originally, as opposed to a DEC microtape; nowadays, as
   opposed to modern QIC and DDS tapes.  Syn. <b><a href="round-tape.html">round tape</a></b>.
