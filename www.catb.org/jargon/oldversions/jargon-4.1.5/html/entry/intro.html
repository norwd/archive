<p><b>intro</b> n. <p>
 [<b><a href="demoscene.html">demoscene</a></b>] Introductory <b><a href="screen.html">screen</a></b> of some
   production.  2. A short <b><a href="demo.html">demo</a></b>, usually showing just one or two
