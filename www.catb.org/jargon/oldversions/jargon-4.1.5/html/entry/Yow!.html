<p><b>Yow!</b> /yow/ interj. <p>
 [from "Zippy the Pinhead" comix] A
   favored hacker expression of humorous surprise or emphasis.  "Yow!

   display hack!"  Compare <b><a href="gurfle.html">gurfle</a></b>.
