<p><b>phage</b> n. <p>
 A program that modifies other programs or
   databases in unauthorized ways; esp. one that propagates a
   <b><a href="virus.html">virus</a></b> or <b><a href="Trojan-horse.html">Trojan horse</a></b>.  See also <b><a href="worm.html">worm</a></b>,
   <b><a href="mockingbird.html">mockingbird</a></b>.  The analogy, of course, is with phage viruses in
   biology.
