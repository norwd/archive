<p><b>black magic</b> n. <p>
 [common] A technique that works, though
   nobody really understands why.  More obscure than <b><a href="voodoo-programming.html">voodoo programming</a></b>, which may be done by cookbook.  Compare also
   <b><a href="black-art.html">black art</a></b>, <b><a href="deep-magic.html">deep magic</a></b>, and <b><a href="magic-number.html">magic number</a></b> (sense 2).
