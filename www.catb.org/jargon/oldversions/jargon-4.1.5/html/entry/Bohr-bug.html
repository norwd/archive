<p><b>Bohr bug</b> /bohr buhg/ n. <p>
 [from quantum physics] A repeatable
   <b><a href="bug.html">bug</a></b>; one that manifests reliably under a possibly unknown but
   well-defined set of conditions.  Antonym of <b><a href="heisenbug.html">heisenbug</a></b>; see also
   <b><a href="mandelbug.html">mandelbug</a></b>, <b><a href="schroedinbug.html">schroedinbug</a></b>.
