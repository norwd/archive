<p><b>dead</b> adj. <p>
 1. Non-functional; <b><a href="down.html">down</a></b>; <b><a href="crash.html">crash</a></b>ed. 
   Especially used of hardware.  2. At XEROX PARC, software that is
   working but not undergoing continued development and support. 
   3. Useless; inaccessible.  Antonym: `live'.  Compare <b><a href="dead-code.html">dead code</a></b>.
