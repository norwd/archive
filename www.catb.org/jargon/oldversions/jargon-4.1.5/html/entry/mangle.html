<p><b>mangle</b> vt. <p>
 1. Used similarly to <b><a href="mung.html">mung</a></b> or <b><a href="scribble.html">scribble</a></b>,
   but more violent in its connotations; something that is mangled has
   been irreversibly and totally trashed. 2. To produce the <b><a href="mangled-name.html">mangled name</a></b> corresponding to a C++ declaration.
