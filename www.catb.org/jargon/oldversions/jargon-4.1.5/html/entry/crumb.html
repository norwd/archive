<p><b>crumb</b> n. <p>
 Two binary digits; a <b><a href="quad.html">quad</a></b>.  Larger than a
   <b><a href="bit.html">bit</a></b>, smaller than a <b><a href="nybble.html">nybble</a></b>.  Considered silly. 
   Syn. <b><a href="tayste.html">tayste</a></b>.  General discussion of such terms is under
   <b><a href="nybble.html">nybble</a></b>.
