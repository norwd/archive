<p><b>include war</b> n. <p>
 Excessive multi-leveled inclusion within a
   discussion <b><a href="thread.html">thread</a></b>, a practice that tends to annoy readers.  In
   a forum with high-traffic newsgroups, such as Usenet, this can lead
   to <b><a href="flame.html">flame</a></b>s and the urge to start a <b><a href="kill-file.html">kill file</a></b>.
