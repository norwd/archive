<p><b>zorkmid</b> /zork'mid/ n. <p>
 The canonical unit of currency in
   hacker-written games.  This originated in <b><a href="Zork.html">Zork</a></b> but has spread
   to <b><a href="nethack.html">nethack</a></b> and is referred to in several other games.
