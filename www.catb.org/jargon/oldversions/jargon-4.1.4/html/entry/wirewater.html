<p><b>wirewater</b> n. <p>
 Syn. <b><a href="programming-fluid.html">programming fluid</a></b>.  This melds the
   mainstream slang adjective `wired' (stimulated, up, hyperactive)
   with `firewater'; however, it refers to caffeinacious rather than
   alcoholic beverages.
