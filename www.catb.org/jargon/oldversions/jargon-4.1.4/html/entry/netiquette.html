<p><b>netiquette</b> /net'ee-ket/ or /net'i-ket/ n. <p>

<p>[portmanteau, network + etiquette] The conventions of politeness
   recognized on <b><a href="Usenet.html">Usenet</a></b>, such as avoidance of cross-posting to
   inappropriate groups and refraining from commercial pluggery
   outside the <i>biz</i> groups.
