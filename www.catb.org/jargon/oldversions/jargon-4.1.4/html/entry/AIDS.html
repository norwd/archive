<p><b>AIDS</b> /aydz/ n. <p>
 Short for A* Infected Disk Syndrome (`A*'
   is a <b><a href="glob.html">glob</a></b> pattern that matches, but is not limited to, Apple
   or Amiga), this condition is quite often the result of practicing
   unsafe <b><a href="SEX.html">SEX</a></b>.  See <b><a href="virus.html">virus</a></b>, <b><a href="worm.html">worm</a></b>, <b><a href="Trojan-horse.html">Trojan horse</a></b>,
   <b><a href="virgin.html">virgin</a></b>.
