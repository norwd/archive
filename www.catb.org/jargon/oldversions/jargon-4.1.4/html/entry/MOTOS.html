<p><b>MOTOS</b> /moh-tohs/ n. <p>
 [acronym from the 1970 U.S. census
   forms via Usenet: Member Of The Opposite Sex] A potential or (less
   often) actual sex partner.  See <b><a href="MOTAS.html">MOTAS</a></b>, <b><a href="MOTSS.html">MOTSS</a></b>, <b><a href="SO.html">SO</a></b>. 
   Less common than MOTSS or <b><a href="MOTAS.html">MOTAS</a></b>, which has largely displaced
   it.
