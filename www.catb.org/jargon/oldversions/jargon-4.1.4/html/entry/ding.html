<p><b>ding</b> n.,vi. <p>
 1. Synonym for <b><a href="feep.html">feep</a></b>.  Usage: rare among
   hackers, but commoner in the <b><a href="Real-World.html">Real World</a></b>.  2. `dinged': What
   happens when someone in authority gives you a minor bitching about
   something, esp. something trivial.  "I was dinged for having a
   messy desk."
