<p><b>Exon</b> /eks'on/ excl. <p>
 A generic obscenity that quickly
   entered wide use on the Internet and Usenet after <b><a href="Black-Thursday.html">Black Thursday</a></b>. From the last name of Senator James Exon
   (Democrat-Nebraska), primary author of the <b><a href="CDA.html">CDA</a></b>.
