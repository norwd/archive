<p><b>poser</b> n. <p>
 A <b><a href="wannabee.html">wannabee</a></b>; not hacker slang, but used among
   crackers, phreaks and <b><a href="warez-d00dz.html">warez d00dz</a></b>.  Not as negative as
   <b><a href="lamer.html">lamer</a></b> or <b><a href="leech.html">leech</a></b>.  Probably derives from a similar usage
   among punk-rockers and metalheads, putting down those who "talk
   the talk but don't walk the walk".
