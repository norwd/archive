<p><b>monstrosity</b> <p>
 1. n. A ridiculously <b><a href="elephantine.html">elephantine</a></b> program
   or system, esp. one that is buggy or only marginally functional. 
   2. adj. The quality of being monstrous (see `Overgeneralization' in
   the discussion of jargonification).  See also <b><a href="baroque.html">baroque</a></b>.
