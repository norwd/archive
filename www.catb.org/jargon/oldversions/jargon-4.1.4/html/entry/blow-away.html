<p>

<p><b>blow away</b> vt. <p>
 To remove (files and directories) from
   permanent storage, generally by accident.  "He reformatted the
   wrong partition and blew away last night's netnews."  Oppose
   <b><a href="nuke.html">nuke</a></b>.
